<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>正邦家政 · 洗冷氣訂單</title>
    
    <!-- PWA 設定 -->
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="正邦">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    
    <style>
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        body{background:#e8ecf1;font-family:-apple-system,BlinkMacSystemFont,"PingFang HK",system-ui,sans-serif;padding:18px 14px 100px 14px;color:#1e293b}

        .card{background:#ffffff;border-radius:28px;padding:22px 18px;margin-bottom:14px;box-shadow:0 2px 12px rgba(0,0,0,0.04);border:1px solid rgba(255,255,255,0.6)}
        .logo-bar{display:flex;align-items:center;gap:12px}
        .logo-icon{font-size:26px}
        .logo-text h1{font-size:20px;font-weight:700;color:#0f172a;letter-spacing:-0.3px}
        .logo-text .sub{font-size:12px;color:#94a3b8;margin-top:-2px}

        .btn{background:#f1f5f9;border:none;padding:10px 18px;border-radius:40px;font-size:13px;font-weight:500;cursor:pointer;transition:.15s;color:#334155}
        .btn:active{transform:scale(.95)}
        .btn-primary{background:linear-gradient(145deg,#1a2a4a,#2a4a7a);color:#fff;box-shadow:0 4px 16px rgba(26,42,74,0.2)}

        .stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:18px}
        .stat-card{background:#ffffff;border-radius:24px;padding:18px 6px;text-align:center;border:1px solid #f1f4f9;box-shadow:0 1px 4px rgba(0,0,0,0.02)}
        .stat-number{font-size:22px;font-weight:700;color:#0f172a;letter-spacing:-0.3px}
        .stat-label{font-size:11px;color:#94a3b8;margin-top:4px;font-weight:500;letter-spacing:.3px}

        .year-selector{display:flex;justify-content:center;align-items:center;gap:14px;margin-bottom:18px}
        .year-selector button{background:#fff;border:1px solid #f1f4f9;width:40px;height:40px;border-radius:40px;font-size:16px;cursor:pointer;color:#475569;box-shadow:0 1px 4px rgba(0,0,0,0.02)}
        .year-selector button:active{transform:scale(.92);background:#f1f5f9}
        .year-selector span{font-size:17px;font-weight:600;min-width:90px;text-align:center;color:#0f172a}

        .month-selector{display:flex;justify-content:center;align-items:center;gap:12px;margin-bottom:10px}
        .month-selector button{background:transparent;border:1px solid #eef2f6;width:34px;height:34px;border-radius:30px;font-size:14px;cursor:pointer;color:#475569}
        .month-selector span{font-size:14px;font-weight:500;min-width:100px;text-align:center;color:#475569}

        .report-tabs{display:flex;gap:8px;margin-bottom:12px}
        .tab-btn{flex:1;background:#f1f5f9;border:none;padding:11px 8px;border-radius:40px;font-weight:500;font-size:13px;cursor:pointer;color:#94a3b8;transition:.15s}
        .tab-btn.active{background:linear-gradient(145deg,#1a2a4a,#2a4a7a);color:#fff;box-shadow:0 4px 16px rgba(26,42,74,0.15)}
        .report-summary{display:flex;justify-content:space-around;padding:12px 8px;background:#f8fafc;border-radius:20px;margin-bottom:10px;font-weight:500;font-size:13px;color:#0f172a;border:1px solid #f1f4f9}
        .report-list{background:#fafcff;border-radius:16px;padding:4px;max-height:170px;overflow-y:auto;border:1px solid #f1f4f9}
        .report-item{display:flex;justify-content:space-between;padding:8px 12px;border-bottom:1px solid #f1f4f9;font-size:13px;color:#475569}
        .report-item:last-child{border-bottom:none}
        .report-item .income{font-weight:600;color:#0f172a}

        .month-nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
        .month-nav button{background:#fff;border:1px solid #f1f4f9;width:40px;height:40px;border-radius:40px;font-size:16px;cursor:pointer;color:#475569;box-shadow:0 1px 4px rgba(0,0,0,0.02)}
        .month-nav button:active{transform:scale(.92);background:#f1f5f9}
        .month-title{font-size:17px;font-weight:600;color:#0f172a}

        .weekdays{display:grid;grid-template-columns:repeat(7,1fr);text-align:center;margin-bottom:8px;font-size:11px;font-weight:500;color:#94a3b8;letter-spacing:.3px}
        .calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
        .date-cell{background:#ffffff;border-radius:16px;padding:5px 2px;min-height:72px;border:1px solid #f1f4f9;cursor:pointer;transition:.1s;box-shadow:0 1px 4px rgba(0,0,0,0.02)}
        .date-cell:active{transform:scale(.95);background:#f8fafc}
        .date-cell.today{border:2px solid #2a4a7a;background:#fafcff}
        .date-cell.has-orders{background:#ffffff}
        .day-number{font-size:13px;font-weight:600;color:#0f172a;margin-bottom:3px;padding-left:4px}

        .date-cell .order-dot{display:flex;flex-wrap:wrap;gap:3px;justify-content:center;padding:0 2px}
        .date-cell .order-dot .dot{
            display:inline-block;
            min-width:26px;
            height:20px;
            border-radius:6px;
            font-size:8px;
            font-weight:600;
            text-align:center;
            line-height:20px;
            color:#fff;
            padding:0 3px;
            letter-spacing:.2px;
            box-shadow:0 1px 4px rgba(0,0,0,0.08)
        }
        .dot.pending{background:#059669}
        .dot.progress{background:#2563eb}
        .dot.completed{background:#dc2626}

        .fab-group{position:fixed;bottom:28px;right:18px;display:flex;flex-direction:column;gap:12px;z-index:100}
        .fab{width:56px;height:56px;border-radius:40px;display:flex;align-items:center;justify-content:center;font-size:24px;cursor:pointer;border:none;transition:.15s}
        .fab:active{transform:scale(.88)}
        .fab-add{background:linear-gradient(145deg,#1a2a4a,#2a4a7a);color:#fff;box-shadow:0 4px 20px rgba(26,42,74,0.25)}
        .fab-paste{background:linear-gradient(145deg,#e8ecf1,#ffffff);color:#0f172a;border:1px solid #f1f4f9;box-shadow:0 4px 20px rgba(0,0,0,0.04)}

        .modal{position:fixed;bottom:0;left:0;right:0;background:#fff;border-radius:32px 32px 0 0;max-height:85vh;overflow-y:auto;z-index:200;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1);box-shadow:0 -4px 24px rgba(0,0,0,0.04)}
        .modal.open{transform:translateY(0)}
        .modal-header{padding:18px 20px 12px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #f1f5f9;position:sticky;top:0;background:#fff}
        .modal-header h3{font-size:18px;font-weight:600;color:#0f172a}
        .close-btn{background:#f1f5f9;border:none;width:36px;height:36px;border-radius:30px;font-size:20px;cursor:pointer;color:#475569}
        .close-btn:active{transform:scale(.9)}
        .modal-body{padding:20px}
        .form-group{margin-bottom:14px}
        .form-group label{font-size:13px;font-weight:500;display:block;margin-bottom:4px;color:#475569}
        .form-group input,.form-group textarea{width:100%;padding:11px 14px;border:1.5px solid #f1f4f9;border-radius:18px;font-size:15px;background:#fafcff;font-family:inherit}
        .form-group input:focus,.form-group textarea:focus{outline:none;border-color:#2a4a7a;box-shadow:0 0 0 3px rgba(42,74,122,0.08)}
        .form-row{display:flex;gap:12px}
        .form-buttons{display:flex;gap:10px;margin-top:18px}
        .form-buttons button{flex:1;padding:13px;border-radius:40px;font-weight:500;font-size:14px;border:none;cursor:pointer}
        .form-buttons button:active{transform:scale(.97)}
        .order-card{border-radius:16px;padding:14px;margin-bottom:10px;border-left:4px solid;background:#fafcff;box-shadow:0 1px 4px rgba(0,0,0,0.02)}
        .order-card.pending{border-left-color:#059669;background:#f0fdf4}
        .order-card.progress{border-left-color:#2563eb;background:#eff6ff}
        .order-card.completed{border-left-color:#dc2626;background:#fef2f2}
        .order-card .time{font-weight:500;font-size:13px;color:#64748b}
        .order-card .name{font-size:16px;font-weight:600;margin:4px 0 3px;color:#0f172a}
        .order-card .detail{font-size:13px;color:#64748b;display:flex;gap:12px;flex-wrap:wrap}
        .order-card .status-text{font-size:12px;font-weight:500;margin-top:4px}
        .order-card .actions{margin-top:8px;display:flex;gap:8px}
        .order-card .actions button{padding:6px 14px;border-radius:30px;border:none;font-size:12px;font-weight:500;cursor:pointer}
        .order-card .actions button:active{transform:scale(.95)}
        .order-card .actions .edit-btn{background:#f1f5f9;color:#475569}
        .order-card .actions .del-btn{background:#fef2f2;color:#dc2626}
        .token-bar{background:#f8fafc;border-radius:16px;padding:12px;margin-top:12px;border:1px solid #f1f4f9}
        .token-input{width:100%;padding:10px 14px;border:1.5px solid #f1f4f9;border-radius:40px;margin-top:6px;font-size:14px;background:#fff}
        .sync-status{font-size:12px;margin-top:6px;text-align:center;color:#94a3b8}
        select{width:100%;padding:11px 14px;border-radius:18px;border:1.5px solid #f1f4f9;background:#fafcff;font-size:15px;font-family:inherit}
        .empty-state{text-align:center;padding:28px 20px;color:#94a3b8;font-size:14px}

        @media(max-width:480px){
            .date-cell{min-height:60px;padding:4px 2px}
            .day-number{font-size:12px}
            .stat-number{font-size:18px}
            .fab{width:52px;height:52px;font-size:22px}
            .date-cell .order-dot .dot{min-width:22px;height:18px;font-size:7px;line-height:18px}
        }
    </style>
</head>
<body>

<div class="card">
    <div class="logo-bar">
        <div class="logo-icon">❄️</div>
        <div class="logo-text">
            <h1>正邦家政</h1>
            <div class="sub">洗冷氣訂單管理</div>
        </div>
    </div>
    <div class="token-bar">
        <div id="tokenStatus" style="font-size:13px;font-weight:500;color:#64748b;">⚪ 未連接雲端</div>
        <input type="password" id="tokenInput" class="token-input" placeholder="輸入 GitHub Token (ghp_開頭)">
        <button class="btn btn-primary" id="saveTokenBtn" style="width:100%;margin-top:6px;">🔗 連接雲端</button>
        <div id="syncStatus" class="sync-status"></div>
    </div>
</div>

<div class="year-selector">
    <button id="prevYearBtn">‹</button>
    <span id="selectedYear">2026年</span>
    <button id="nextYearBtn">›</button>
</div>

<div class="stats-grid">
    <div class="stat-card"><div class="stat-number" id="totalIncome">$0</div><div class="stat-label">💰 年度收入</div></div>
    <div class="stat-card"><div class="stat-number" id="totalOrders">0</div><div class="stat-label">📋 總訂單</div></div>
    <div class="stat-card"><div class="stat-number" id="totalUnits">0</div><div class="stat-label">❄️ 總洗機</div></div>
</div>

<div class="card">
    <div class="report-tabs">
        <button class="tab-btn active" id="weekTab">📅 本週</button>
        <button class="tab-btn" id="monthTab">📆 本月</button>
    </div>
    <div class="month-selector" id="monthSelector" style="display:none;">
        <button id="prevMonthStatBtn">‹</button>
        <span id="statMonthDisplay">2026年 6月</span>
        <button id="nextMonthStatBtn">›</button>
    </div>
    <div id="reportSummary" class="report-summary">💰 $0 &nbsp;│&nbsp; ❄️ 0部</div>
    <div id="reportList" class="report-list"><div class="empty-state">暫無訂單</div></div>
</div>

<div class="card">
    <div class="month-nav">
        <button id="prevMonth">‹</button>
        <span class="month-title" id="monthTitle"></span>
        <button id="nextMonth">›</button>
    </div>
    <div class="weekdays"><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span><span>日</span></div>
    <div id="calendarGrid" class="calendar-grid"></div>
</div>

<div class="fab-group">
    <button class="fab fab-paste" id="pasteBtn">🤖</button>
    <button class="fab fab-add" id="addBtn">+</button>
</div>

<div id="orderModal" class="modal">
    <div class="modal-header"><h3 id="modalTitle">➕ 新增訂單</h3><button class="close-btn" id="closeOrderModal">✕</button></div>
    <div class="modal-body">
        <input type="hidden" id="editId">
        <div class="form-group"><label>客戶稱呼</label><input type="text" id="name" placeholder="例: 陳先生"></div>
        <div class="form-group"><label>聯絡電話</label><input type="tel" id="phone" placeholder="66668888"></div>
        <div class="form-row"><div class="form-group"><label>日期</label><input type="date" id="date"></div><div class="form-group"><label>時間</label><input type="time" id="time"></div></div>
        <div class="form-group"><label>數量</label><input type="number" id="count" min="1" value="1"></div>
        <div class="form-group"><label>地址 / 備註</label><textarea id="note" rows="2"></textarea></div>
        <div class="form-group"><label>單價</label><input type="number" id="price" step="10" value="228"></div>
        <div class="form-group"><label>訂單狀態</label><select id="status"><option value="pending">🟢 未開始</option><option value="progress">🔵 進行中</option><option value="completed">🔴 已完成</option></select></div>
        <div class="form-buttons"><button id="deleteBtn" style="display:none;background:#fef2f2;color:#dc2626;">🗑️ 刪除</button><button id="saveBtn" style="background:linear-gradient(145deg,#1a2a4a,#2a4a7a);color:#fff;box-shadow:0 4px 16px rgba(26,42,74,0.15);">💾 保存</button></div>
    </div>
</div>

<div id="pasteModal" class="modal">
    <div class="modal-header"><h3>🤖 智能粘貼</h3><button class="close-btn" id="closePasteModal">✕</button></div>
    <div class="modal-body">
        <textarea id="pasteText" rows="5" style="width:100%;padding:12px;border-radius:18px;border:1.5px solid #f1f4f9;font-family:monospace;font-size:14px;background:#fafcff;"></textarea>
        <button id="recognizeBtn" style="margin-top:12px;width:100%;background:linear-gradient(145deg,#1a2a4a,#2a4a7a);color:#fff;border:none;padding:12px;border-radius:40px;font-weight:500;font-size:15px;cursor:pointer;box-shadow:0 4px 16px rgba(26,42,74,0.15);">🔍 自動識別</button>
        <div id="preview" style="margin-top:14px;display:none;"></div>
    </div>
</div>

<div id="detailModal" class="modal">
    <div class="modal-header"><h3 id="detailTitle"></h3><button class="close-btn" id="closeDetailModal">✕</button></div>
    <div class="modal-body" id="detailList"></div>
</div>

<script>
var GH_USER="althellobye",GH_REPO="my-order-data",API_URL="https://api.github.com/repos/"+GH_USER+"/"+GH_REPO+"/contents/data.json";
var allOrders=[],fileSha="",currentYear=new Date().getFullYear(),currentMonth=new Date().getMonth(),selectedYear=new Date().getFullYear(),currentReport="week",githubToken=localStorage.getItem('github_token')||"",DEFAULT_PRICE=228,statMonth=new Date().getMonth(),statYear=new Date().getFullYear();

function checkDateChange(){var n=new Date(),s=localStorage.getItem('last_date_check'),t=n.toDateString();if(s!==t){localStorage.setItem('last_date_check',t);refreshAll();var st=document.getElementById('syncStatus');st.innerHTML='🔄 日期已更新';st.style.color='#0f172a';setTimeout(function(){if(st.innerHTML==='🔄 日期已更新')st.innerHTML='';},3000);}}
setInterval(checkDateChange,30000);checkDateChange();

function showStatus(m,e){var d=document.getElementById('syncStatus');d.innerHTML=m;d.style.color=e?'#dc2626':'#0f172a';setTimeout(function(){if(d.innerHTML===m)d.innerHTML='';},3000);}
function b64e(s){return btoa(unescape(encodeURIComponent(s)));}
function b64d(s){return decodeURIComponent(escape(atob(s)));}

async function loadFromGit(){if(!githubToken){loadLocal();return;}try{var r=await fetch(API_URL+'?t='+Date.now(),{headers:{"Authorization":"token "+githubToken}});if(r.status===401){showStatus("Token無效",true);return;}if(r.status===404){await createFile();return;}var d=await r.json();fileSha=d.sha;var c=b64d(d.content);allOrders=JSON.parse(c||"[]");localStorage.setItem('ac_backup',JSON.stringify(allOrders));refreshAll();showStatus("✅ 已從雲端同步",false);document.getElementById('tokenStatus').innerHTML='🟢 已連接雲端';}catch(e){showStatus("⚠️ 雲端失敗，使用本地",true);loadLocal();}}
async function createFile(){var c=b64e(JSON.stringify([],null,2));var r=await fetch(API_URL,{method:"PUT",headers:{"Authorization":"token "+githubToken,"Content-Type":"application/json"},body:JSON.stringify({message:"init",content:c,branch:"main"})});if(r.ok){var d=await r.json();fileSha=d.content.sha;allOrders=[];refreshAll();showStatus("✅ 已創建",false);}else{showStatus("❌ 創建失敗",true);loadLocal();}}
async function saveToGit(){if(!githubToken||!fileSha){saveLocal();return;}var c=b64e(JSON.stringify(allOrders,null,2));try{var r=await fetch(API_URL,{method:"PUT",headers:{"Authorization":"token "+githubToken,"Content-Type":"application/json"},body:JSON.stringify({message:"update",content:c,sha:fileSha,branch:"main"})});if(r.ok){var d=await r.json();fileSha=d.content.sha;localStorage.setItem('ac_backup',JSON.stringify(allOrders));showStatus("✅ 已保存",false);}else{saveLocal();}}catch(e){saveLocal();}}
function loadLocal(){var s=localStorage.getItem('ac_backup');allOrders=s?JSON.parse(s):[];refreshAll();}
function saveLocal(){localStorage.setItem('ac_backup',JSON.stringify(allOrders));refreshAll();}
function saveData(){if(githubToken&&fileSha)saveToGit();else saveLocal();}
function refreshAll(){renderCalendar();updateYearStats();if(currentReport==='week')renderReport('week');else renderMonthStatReport(statYear,statMonth);}
function getOrderStatus(o){if(o.status)return o.status;var n=new Date(),ot=new Date(o.datetime);if(ot<n)return'completed';else if(ot.toDateString()===n.toDateString())return'progress';else return'pending';}
function getStatusText(s){if(s==='pending')return'🟢 未開始';if(s==='progress')return'🔵 進行中';return'🔴 已完成';}
function updateYearStats(){document.getElementById('selectedYear').innerHTML=selectedYear+'年';var inc=0,ord=0,unt=0;for(var i=0;i<allOrders.length;i++){var o=allOrders[i];var y=new Date(o.datetime).getFullYear();if(y===selectedYear){var p=o.price||DEFAULT_PRICE;inc+=(o.count||1)*p;ord++;unt+=(o.count||1);}}document.getElementById('totalIncome').innerHTML='$'+inc.toLocaleString();document.getElementById('totalOrders').innerText=ord;document.getElementById('totalUnits').innerText=unt;}
function getWeekRange(){var n=new Date(),d=n.getDay();var m=new Date(n);m.setDate(n.getDate()-(d===0?6:d-1));var s=new Date(m);s.setDate(m.getDate()+6);function f(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}return{start:f(m),end:f(s)};}
function getMonthRange(y,m){var s=y+'-'+String(m+1).padStart(2,'0')+'-01';var l=new Date(y,m+1,0).getDate();return{start:s,end:y+'-'+String(m+1).padStart(2,'0')+'-'+String(l).padStart(2,'0')};}
function renderReport(p){var r=p==='week'?getWeekRange():getMonthRange(new Date().getFullYear(),new Date().getMonth());if(p==='week'){document.getElementById('monthSelector').style.display='none';}else{document.getElementById('monthSelector').style.display='flex';document.getElementById('statMonthDisplay').innerHTML=statYear+'年 '+(statMonth+1)+'月';}var d=[],tI=0,tU=0;for(var i=0;i<allOrders.length;i++){var o=allOrders[i];var dt=o.datetime.split('T')[0];if(dt>=r.start&&dt<=r.end){var inc=(o.price||DEFAULT_PRICE)*(o.count||1);d.push({date:dt,name:o.name,count:o.count,income:inc});tI+=inc;tU+=(o.count||1);}}d.sort(function(a,b){return a.date.localeCompare(b.date);});var c=document.getElementById('reportList');var sm=document.getElementById('reportSummary');sm.innerHTML='💰 $'+tI.toLocaleString()+' &nbsp;│&nbsp; ❄️ '+tU+'部';if(d.length===0){c.innerHTML='<div class="empty-state">暫無訂單</div>';}else{var html='';for(var i=0;i<d.length;i++){html+='<div class="report-item"><span>'+d[i].date+'</span><span>'+d[i].name+'('+d[i].count+'部)</span><span class="income">$'+d[i].income+'</span></div>';}c.innerHTML=html;}}
function renderMonthStatReport(y,m){document.getElementById('monthSelector').style.display='flex';document.getElementById('statMonthDisplay').innerHTML=y+'年 '+(m+1)+'月';var r=getMonthRange(y,m);var d=[],tI=0,tU=0;for(var i=0;i<allOrders.length;i++){var o=allOrders[i];var dt=o.datetime.split('T')[0];if(dt>=r.start&&dt<=r.end){var inc=(o.price||DEFAULT_PRICE)*(o.count||1);d.push({date:dt,name:o.name,count:o.count,income:inc});tI+=inc;tU+=(o.count||1);}}d.sort(function(a,b){return a.date.localeCompare(b.date);});var c=document.getElementById('reportList');var sm=document.getElementById('reportSummary');sm.innerHTML='💰 $'+tI.toLocaleString()+' &nbsp;│&nbsp; ❄️ '+tU+'部';if(d.length===0){c.innerHTML='<div class="empty-state">暫無訂單</div>';}else{var html='';for(var i=0;i<d.length;i++){html+='<div class="report-item"><span>'+d[i].date+'</span><span>'+d[i].name+'('+d[i].count+'部)</span><span class="income">$'+d[i].income+'</span></div>';}c.innerHTML=html;}}
function renderCalendar(){var f=new Date(currentYear,currentMonth,1);var off=(f.getDay()===0?6:f.getDay()-1);var days=new Date(currentYear,currentMonth+1,0).getDate();var g=document.getElementById('calendarGrid');g.innerHTML="";document.getElementById('monthTitle').innerHTML=currentYear+'年'+String(currentMonth+1).padStart(2,'0')+'月';var today=new Date().toISOString().slice(0,10);for(var i=0;i<off;i++){var e=document.createElement('div');e.className='date-cell';e.style.background='#f8fafc';e.style.opacity='0.4';g.appendChild(e);}for(var d=1;d<=days;d++){var ds=currentYear+'-'+String(currentMonth+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');var dayOrders=allOrders.filter(function(o){return o.datetime&&o.datetime.startsWith(ds);});var cell=document.createElement('div');cell.className='date-cell';if(dayOrders.length>0)cell.classList.add('has-orders');if(ds===today)cell.classList.add('today');var num=document.createElement('div');num.className='day-number';num.innerText=d;cell.appendChild(num);if(dayOrders.length>0){var dotContainer=document.createElement('div');dotContainer.className='order-dot';for(var j=0;j<dayOrders.length;j++){var o=dayOrders[j];var st=getOrderStatus(o);var dot=document.createElement('span');dot.className='dot '+st;var timeStr=o.datetime.split('T')[1].slice(0,5);dot.innerText=timeStr;dotContainer.appendChild(dot);}cell.appendChild(dotContainer);}cell.onclick=(function(ds,dayOrders){return function(){showDetail(ds,dayOrders);};})(ds,dayOrders);g.appendChild(cell);}}
function showDetail(ds,orders){document.getElementById('detailTitle').innerHTML='📅 '+ds;var c=document.getElementById('detailList');if(orders.length===0){c.innerHTML='<div class="empty-state">暫無訂單</div>';}else{var html='';for(var i=0;i<orders.length;i++){var o=orders[i];var p=o.price||DEFAULT_PRICE;var st=getOrderStatus(o);var stText=getStatusText(st);html+='<div class="order-card '+st+'">';html+='<div class="time">⏰ '+o.datetime.split('T')[1]+'</div>';html+='<div class="name">❄️ '+escapeHtml(o.name)+'</div>';html+='<div class="detail"><span>📞 '+(o.phone||'')+'</span><span>🔢 '+o.count+'部 × $'+p+' = $'+((o.count||1)*p)+'</span></div>';html+='<div class="status-text">'+stText+'</div>';if(o.note){html+='<div style="font-size:13px;color:#64748b;margin-top:3px;">📍 '+escapeHtml(o.note)+'</div>';}html+='<div class="actions"><button class="edit-btn" data-id="'+o.id+'">✏️ 編輯</button><button class="del-btn" data-id="'+o.id+'">🗑️ 刪除</button></div>';html+='</div>';}c.innerHTML=html;var editBtns=document.querySelectorAll('.edit-btn');for(var i=0;i<editBtns.length;i++){editBtns[i].onclick=function(){editOrder(this.getAttribute('data-id'));};}var delBtns=document.querySelectorAll('.del-btn');for(var i=0;i<delBtns.length;i++){delBtns[i].onclick=function(){var that=this;if(confirm('確認刪除？')){allOrders=allOrders.filter(function(o){return o.id!==that.getAttribute('data-id');});saveData();closeDetailModal();}};}}document.getElementById('detailModal').classList.add('open');}
function editOrder(id){var o=null;for(var i=0;i<allOrders.length;i++){if(allOrders[i].id===id){o=allOrders[i];break;}}if(!o)return;document.getElementById('editId').value=o.id;document.getElementById('name').value=o.name;document.getElementById('phone').value=o.phone||'';document.getElementById('date').value=o.datetime.split('T')[0];document.getElementById('time').value=o.datetime.split('T')[1];document.getElementById('count').value=o.count;document.getElementById('note').value=o.note||'';document.getElementById('price').value=o.price||DEFAULT_PRICE;document.getElementById('status').value=o.status||getOrderStatus(o);document.getElementById('modalTitle').innerText="✏️ 編輯訂單";document.getElementById('deleteBtn').style.display="block";closeDetailModal();openOrderModal();}
async function saveOrder(){var id=document.getElementById('editId').value||('id_'+Date.now()+'_'+Math.random().toString(36).substr(2,6));var name=document.getElementById('name').value.trim();var phone=document.getElementById('phone').value.trim();var date=document.getElementById('date').value;var time=document.getElementById('time').value;var count=parseInt(document.getElementById('count').value);var note=document.getElementById('note').value.trim();var price=parseInt(document.getElementById('price').value);var status=document.getElementById('status').value;var isEdit=document.getElementById('editId').value!=='';if(!name||!phone||!date||!time||!count){alert("請填寫完整");return;}if(isNaN(price)||price<=0)price=DEFAULT_PRICE;var datetime=date+'T'+time;for(var i=0;i<allOrders.length;i++){if(allOrders[i].datetime===datetime&&allOrders[i].id!==id){alert('⚠️ '+date+' '+time+' 已被預約');return;}}var orderData={id:id,name:name,phone:phone,datetime:datetime,count:count,note:note,price:price,status:status};if(isEdit){for(var i=0;i<allOrders.length;i++){if(allOrders[i].id===id){allOrders[i]=orderData;break;}}}else{allOrders.push(orderData);}await saveData();closeOrderModal();}
async function deleteOrder(){var id=document.getElementById('editId').value;var name=document.getElementById('name').value;if(!confirm('刪除「'+name+'」嗎？'))return;allOrders=allOrders.filter(function(o){return o.id!==id;});await saveData();closeOrderModal();}
function escapeHtml(s){if(!s)return'';return s.replace(/[&<>]/g,function(m){if(m==='&')return'&amp;';if(m==='<')return'&lt;';if(m==='>')return'&gt;';return m;});}
function recognizeText(t){var r={name:"",phone:"",date:"",time:"",count:1,note:""};var m=t.match(/\b(\d{8})\b/);if(m)r.phone=m[1];else{m=t.match(/1[3-9]\d{9}/);if(m)r.phone=m[0];}m=t.match(/(\d+)\s*[部台]/);if(m)r.count=parseInt(m[1]);var today=new Date();function fmt(y,m,d){return y+'-'+String(m).padStart(2,'0')+'-'+String(d).padStart(2,'0');}if(t.includes("今日")||t.includes("今天"))r.date=fmt(today.getFullYear(),today.getMonth()+1,today.getDate());else if(t.includes("聽日")||t.includes("明天")){var d=new Date(today);d.setDate(today.getDate()+1);r.date=fmt(d.getFullYear(),d.getMonth()+1,d.getDate());}else if(t.includes("後日")||t.includes("后天")){var d=new Date(today);d.setDate(today.getDate()+2);r.date=fmt(d.getFullYear(),d.getMonth()+1,d.getDate());}else{var dm=t.match(/(\d{1,2})月(\d{1,2})[日號]/);if(dm){var mo=parseInt(dm[1]);var da=parseInt(dm[2]);var yr=today.getFullYear();if(mo<today.getMonth()+1)yr++;r.date=fmt(yr,mo,da);}}var tm=t.match(/(\d{1,2})[:：](\d{2})/);if(tm)r.time=String(tm[1]).padStart(2,'0')+':'+tm[2];else{tm=t.match(/(\d{1,2})\s*[點点]/);if(tm){var h=parseInt(tm[1]);if((t.includes("下午")||t.includes("下晝"))&&h<12)h+=12;r.time=String(h).padStart(2,'0')+':00';}}var nm=t.match(/([陳張李黃何鄭梁謝吳劉][生太小姐女士先生]?)/);r.name=nm?nm[0]+" 洗冷氣":"洗冷氣訂單";var ad=t.match(/(?:地址|响|喺)[：:]*\s*([^，,。\n]{5,30})/);if(ad)r.note=ad[1];return r;}
function doRecognize(){var raw=document.getElementById('pasteText').value;if(!raw.trim()){alert("請貼上聊天記錄");return;}var rec=recognizeText(raw);var div=document.getElementById('preview');div.style.display='block';div.innerHTML='<div style="background:#f8fafc;padding:14px;border-radius:18px;border:1px solid #f1f4f9;"><strong style="font-size:15px;color:#0f172a;">✅ 識別結果</strong><div style="margin-top:8px;line-height:1.8;color:#475569;">📛 客戶：'+rec.name+'<br>📞 電話：'+(rec.phone||'未識別')+'<br>📅 日期：'+(rec.date||'未識別')+'<br>⏰ 時間：'+(rec.time||'未識別')+'<br>🔢 數量：'+rec.count+'部<br>📍 地址：'+(rec.note||'無')+'</div><button id="applyBtn" style="margin-top:12px;width:100%;background:linear-gradient(145deg,#1a2a4a,#2a4a7a);color:#fff;border:none;padding:10px;border-radius:40px;font-weight:500;box-shadow:0 4px 16px rgba(26,42,74,0.15);">📝 填寫</button></div>';document.getElementById('applyBtn').onclick=function(){document.getElementById('name').value=rec.name;document.getElementById('phone').value=rec.phone||'';if(rec.date)document.getElementById('date').value=rec.date;if(rec.time)document.getElementById('time').value=rec.time;document.getElementById('count').value=rec.count;document.getElementById('note').value=rec.note||'';document.getElementById('price').value=DEFAULT_PRICE;document.getElementById('status').value='pending';document.getElementById('editId').value='';document.getElementById('deleteBtn').style.display='none';document.getElementById('modalTitle').innerText="➕ 新增訂單";closePasteModal();openOrderModal();};}
function openOrderModal(){document.getElementById('orderModal').classList.add('open');}
function closeOrderModal(){document.getElementById('orderModal').classList.remove('open');}
function openPasteModal(){document.getElementById('pasteModal').classList.add('open');document.getElementById('preview').style.display='none';document.getElementById('pasteText').value='';}
function closePasteModal(){document.getElementById('pasteModal').classList.remove('open');}
function closeDetailModal(){document.getElementById('detailModal').classList.remove('open');}

document.getElementById('prevMonth').onclick=function(){currentMonth--;if(currentMonth<0){currentMonth=11;currentYear--;}renderCalendar();};
document.getElementById('nextMonth').onclick=function(){currentMonth++;if(currentMonth>11){currentMonth=0;currentYear++;}renderCalendar();};
document.getElementById('prevYearBtn').onclick=function(){selectedYear--;updateYearStats();};
document.getElementById('nextYearBtn').onclick=function(){selectedYear++;updateYearStats();};
document.getElementById('addBtn').onclick=function(){document.getElementById('editId').value='';document.getElementById('name').value='';document.getElementById('phone').value='';document.getElementById('date').value=new Date().toISOString().slice(0,10);document.getElementById('time').value='';document.getElementById('count').value='1';document.getElementById('note').value='';document.getElementById('price').value=DEFAULT_PRICE;document.getElementById('status').value='pending';document.getElementById('deleteBtn').style.display='none';document.getElementById('modalTitle').innerText="➕ 新增訂單";openOrderModal();};
document.getElementById('pasteBtn').onclick=openPasteModal;
document.getElementById('closeOrderModal').onclick=closeOrderModal;
document.getElementById('closePasteModal').onclick=closePasteModal;
document.getElementById('closeDetailModal').onclick=closeDetailModal;
document.getElementById('saveBtn').onclick=saveOrder;
document.getElementById('deleteBtn').onclick=deleteOrder;
document.getElementById('recognizeBtn').onclick=doRecognize;
document.getElementById('weekTab').onclick=function(){currentReport='week';var btns=document.querySelectorAll('.tab-btn');for(var i=0;i<btns.length;i++)btns[i].classList.remove('active');document.getElementById('weekTab').classList.add('active');renderReport('week');};
document.getElementById('monthTab').onclick=function(){currentReport='month';var btns=document.querySelectorAll('.tab-btn');for(var i=0;i<btns.length;i++)btns[i].classList.remove('active');document.getElementById('monthTab').classList.add('active');statMonth=new Date().getMonth();statYear=new Date().getFullYear();renderMonthStatReport(statYear,statMonth);};
document.getElementById('prevMonthStatBtn').onclick=function(){statMonth--;if(statMonth<0){statMonth=11;statYear--;}renderMonthStatReport(statYear,statMonth);};
document.getElementById('nextMonthStatBtn').onclick=function(){statMonth++;if(statMonth>11){statMonth=0;statYear++;}renderMonthStatReport(statYear,statMonth);};
document.getElementById('saveTokenBtn').onclick=function(){var t=document.getElementById('tokenInput').value.trim();if(t){localStorage.setItem('github_token',t);githubToken=t;document.getElementById('tokenStatus').innerHTML='🟢 已連接雲端';loadFromGit();}};
loadLocal();if(githubToken){document.getElementById('tokenStatus').innerHTML='🟢 已連接雲端';loadFromGit();}
