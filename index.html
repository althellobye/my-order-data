<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>订单管理系统 - 手机优化版</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        * {
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }
        
        body {
            background: #f5f7fb;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        
        /* 订单卡片样式 */
        .order-card {
            background: white;
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
            border: 1px solid #f0f0f0;
            transition: all 0.2s ease;
        }
        
        .order-card:active {
            transform: scale(0.99);
            background: #fafafa;
        }
        
        /* 时间标签 */
        .time-badge {
            background: #059669;
            color: white;
            font-size: 13px;
            font-weight: 600;
            padding: 4px 12px;
            border-radius: 30px;
            display: inline-block;
        }
        
        /* 老客标签 */
        .vip-badge {
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            color: white;
            font-size: 11px;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 30px;
            display: inline-block;
        }
        
        /* 数量标签 */
        .count-badge {
            background: #eef2ff;
            color: #4f46e5;
            font-size: 14px;
            font-weight: 700;
            padding: 6px 12px;
            border-radius: 30px;
        }
        
        /* 日期导航 */
        .date-nav {
            overflow-x: auto;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
        }
        
        .date-nav::-webkit-scrollbar {
            display: none;
        }
        
        .date-item {
            flex-shrink: 0;
            text-align: center;
            padding: 8px 12px;
            border-radius: 40px;
            background: white;
            border: 1px solid #e5e7eb;
            transition: all 0.2s;
        }
        
        .date-item.active {
            background: #059669;
            border-color: #059669;
            color: white;
        }
        
        .date-item.active .date-week {
            color: rgba(255,255,255,0.8);
        }
        
        .date-day {
            font-size: 20px;
            font-weight: 700;
        }
        
        .date-week {
            font-size: 11px;
            color: #6b7280;
        }
        
        /* 悬浮按钮 */
        .floating-btn {
            position: fixed;
            bottom: 24px;
            right: 24px;
            width: 60px;
            height: 60px;
            background: #059669;
            color: white;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: 300;
            box-shadow: 0 4px 15px rgba(5, 150, 105, 0.4);
            cursor: pointer;
            transition: all 0.2s;
            z-index: 100;
            border: none;
        }
        
        .floating-btn:active {
            transform: scale(0.94);
            background: #047857;
        }
        
        /* 弹窗样式 */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: flex-end;
            justify-content: center;
            z-index: 200;
            visibility: hidden;
            opacity: 0;
            transition: all 0.3s;
        }
        
        .modal-overlay.active {
            visibility: visible;
            opacity: 1;
        }
        
        .modal-container {
            background: white;
            width: 100%;
            max-width: 500px;
            border-radius: 28px 28px 0 0;
            max-height: 85vh;
            overflow-y: auto;
            transform: translateY(100%);
            transition: transform 0.3s;
        }
        
        .modal-overlay.active .modal-container {
            transform: translateY(0);
        }
        
        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #9ca3af;
        }
        
        /* 加载动画 */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #e5e7eb;
            border-top-color: #059669;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <!-- 主容器 -->
    <div class="max-w-2xl mx-auto px-4 py-4 pb-28">
        
        <!-- 头部 -->
        <div class="flex justify-between items-center mb-5">
            <div>
                <h1 class="text-2xl font-bold text-gray-800">📋 订单管理</h1>
                <p class="text-xs text-gray-400 mt-0.5" id="syncStatus">加载中...</p>
            </div>
            <div class="flex gap-2">
                <button onclick="clearToken()" class="bg-gray-100 active:bg-gray-200 text-gray-600 px-3 py-2 rounded-full text-sm font-medium transition-colors">
                    重置
                </button>
                <button onclick="fetchOrders()" class="bg-emerald-50 active:bg-emerald-100 text-emerald-600 px-3 py-2 rounded-full text-sm font-medium transition-colors">
                    刷新
                </button>
            </div>
        </div>
        
        <!-- 日期横向滚动选择器 -->
        <div class="date-nav flex gap-2 mb-5 pb-1">
            <div id="dateList" class="flex gap-2">
                <!-- JS 动态生成日期 -->
            </div>
        </div>
        
        <!-- 订单列表区域 -->
        <div id="ordersContainer">
            <div class="empty-state">
                <div class="loading mx-auto mb-3"></div>
                <p>加载订单中...</p>
            </div>
        </div>
    </div>

    <!-- 悬浮加号按钮 -->
    <button class="floating-btn" id="addBtn">+</button>

    <!-- 订单弹窗 -->
    <div id="orderModal" class="modal-overlay">
        <div class="modal-container">
            <div class="p-5">
                <!-- 拖拽条 -->
                <div class="w-12 h-1 bg-gray-200 rounded-full mx-auto mb-5"></div>
                
                <h3 id="modalTitle" class="text-xl font-bold text-gray-800 mb-5">➕ 添加订单</h3>
                
                <form id="orderForm" onsubmit="return false;">
                    <input type="hidden" id="orderId">
                    
                    <div class="mb-4">
                        <label class="block text-sm font-semibold text-gray-600 mb-1.5">📛 订单名称</label>
                        <input type="text" id="orderName" required placeholder="例: 奶茶团购" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-base outline-none focus:border-emerald-500 focus:bg-white transition-all">
                    </div>
                    
                    <div class="mb-4">
                        <label class="block text-sm font-semibold text-gray-600 mb-1.5">
                            📞 联系电话 <span class="text-emerald-500 text-xs">(自动识别老客)</span>
                        </label>
                        <input type="tel" id="orderPhone" required placeholder="13800000000" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-base outline-none focus:border-emerald-500 focus:bg-white transition-all">
                        <div id="vipHint" class="text-xs mt-2 hidden"></div>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-3 mb-4">
                        <div>
                            <label class="block text-sm font-semibold text-gray-600 mb-1.5">📅 日期</label>
                            <input type="date" id="orderDate" required class="w-full px-3 py-3 bg-gray-50 border border-gray-200 rounded-xl text-base outline-none focus:border-emerald-500">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-600 mb-1.5">⏰ 时间</label>
                            <input type="time" id="orderTime" required class="w-full px-3 py-3 bg-gray-50 border border-gray-200 rounded-xl text-base outline-none focus:border-emerald-500">
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="block text-sm font-semibold text-gray-600 mb-1.5">🔢 多少部</label>
                        <input type="number" id="orderCount" required min="1" placeholder="1" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-base outline-none focus:border-emerald-500">
                    </div>
                    
                    <div class="mb-5">
                        <label class="block text-sm font-semibold text-gray-600 mb-1.5">📝 补充说明</label>
                        <textarea id="orderNote" rows="2" placeholder="没有可不填..." class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-base outline-none focus:border-emerald-500 resize-none"></textarea>
                    </div>
                    
                    <div class="flex gap-3">
                        <button type="button" id="deleteBtn" class="hidden flex-1 bg-rose-50 active:bg-rose-100 text-rose-600 py-3 rounded-xl font-semibold text-sm transition-colors">🗑️ 删除</button>
                        <button type="button" id="closeModalBtn" class="flex-1 bg-gray-100 active:bg-gray-200 text-gray-600 py-3 rounded-xl font-semibold text-sm transition-colors">取消</button>
                        <button type="button" id="submitOrderBtn" class="flex-1 bg-emerald-600 active:bg-emerald-700 text-white py-3 rounded-xl font-semibold text-sm shadow-md transition-colors">保存</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        // GitHub 配置
        const GH_USER = "althellobye";
        const GH_REPO = "my-order-data";
        const GH_BRANCH = "main";
        const FILE_PATH = "data.json";
        const API_URL = `https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/${FILE_PATH}`;

        let allOrders = [];
        let fileSha = "";
        let currentSelectedDate = new Date().toISOString().slice(0, 10);
        
        // 获取 Token
        function getAuthToken() {
            let token = localStorage.getItem('gh_order_token');
            if (!token || token.trim() === "") {
                token = prompt("🔑 请输入 GitHub Token (ghp_开头):");
                if (token) localStorage.setItem('gh_order_token', token.trim());
            }
            return token;
        }
        
        function clearToken() {
            localStorage.removeItem('gh_order_token');
            alert("令牌已清除");
            location.reload();
        }
        
        // 检查老客
        function isReturningCustomer(phone, excludeId = null) {
            if (!phone) return false;
            return allOrders.some(order => order.phone === phone && order.id !== excludeId);
        }
        
        function getCustomerOrderCount(phone, excludeId = null) {
            if (!phone) return 0;
            return allOrders.filter(order => order.phone === phone && order.id !== excludeId).length;
        }
        
        // 显示老客提示
        function checkVipHint(phone, orderId = null) {
            const hint = document.getElementById('vipHint');
            if (phone && isReturningCustomer(phone, orderId)) {
                const count = getCustomerOrderCount(phone, orderId);
                hint.innerHTML = `🏆 老客！这是第 ${count + 1} 次下单`;
                hint.className = "text-xs mt-2 p-2 bg-amber-50 text-amber-700 rounded-lg";
            } else if (phone && !isReturningCustomer(phone, orderId)) {
                hint.innerHTML = `✨ 新客户，首次下单 ✨`;
                hint.className = "text-xs mt-2 p-2 bg-emerald-50 text-emerald-700 rounded-lg";
            } else {
                hint.className = "text-xs mt-2 hidden";
            }
        }
        
        // 获取所有订单
        async function fetchOrders() {
            const token = getAuthToken();
            if (!token) return;
            
            document.getElementById('syncStatus').innerHTML = '<span class="loading w-3 h-3 inline-block align-middle mr-1"></span> 同步中...';
            
            try {
                const res = await fetch(`${API_URL}?t=${Date.now()}`, {
                    headers: { "Authorization": `token ${token}` }
                });
                if (res.status === 401 || res.status === 403) {
                    alert("令牌无效，请重置");
                    clearToken();
                    return;
                }
                const data = await res.json();
                fileSha = data.sha;
                const content = decodeURIComponent(atob(data.content));
                allOrders = JSON.parse(content || "[]");
                
                document.getElementById('syncStatus').innerHTML = `✅ 已同步 · ${allOrders.length}个订单`;
                renderDateSelector();
                renderOrdersByDate(currentSelectedDate);
            } catch(err) {
                console.error(err);
                document.getElementById('syncStatus').innerHTML = "⚠️ 加载失败";
            }
        }
        
        // 渲染日期选择器（显示有订单的日期）
        function renderDateSelector() {
            // 收集所有有订单的日期
            const datesWithOrders = new Set();
            allOrders.forEach(order => {
                const date = order.datetime.split('T')[0];
                datesWithOrders.add(date);
            });
            
            // 生成最近30天的日期
            const dates = [];
            const today = new Date();
            for (let i = -7; i <= 30; i++) {
                const d = new Date(today);
                d.setDate(today.getDate() + i);
                const dateStr = d.toISOString().slice(0, 10);
                const hasOrder = datesWithOrders.has(dateStr);
                dates.push({ date: dateStr, hasOrder });
            }
            
            const container = document.getElementById('dateList');
            const weekdays = ['日', '一', '二', '三', '四', '五', '六'];
            
            container.innerHTML = dates.map(d => {
                const dateObj = new Date(d.date);
                const day = dateObj.getDate();
                const weekday = weekdays[dateObj.getDay()];
                const isActive = d.date === currentSelectedDate;
                const isToday = d.date === today.toISOString().slice(0, 10);
                
                return `
                    <div class="date-item ${isActive ? 'active' : ''}" data-date="${d.date}" onclick="selectDate('${d.date}')">
                        <div class="date-day">${day}</div>
                        <div class="date-week">${weekday}</div>
                        ${d.hasOrder ? '<div class="text-[10px] mt-0.5">●</div>' : '<div class="text-[10px] mt-0.5 opacity-0">●</div>'}
                    </div>
                `;
            }).join('');
        }
        
        // 选择日期
        window.selectDate = function(date) {
            currentSelectedDate = date;
            renderDateSelector();
            renderOrdersByDate(date);
        };
        
        // 按日期渲染订单列表
        function renderOrdersByDate(date) {
            const container = document.getElementById('ordersContainer');
            const dayOrders = allOrders.filter(order => order.datetime.startsWith(date));
            
            // 按时间排序
            dayOrders.sort((a, b) => a.datetime.localeCompare(b.datetime));
            
            if (dayOrders.length === 0) {
                container.innerHTML = `
                    <div class="empty-state bg-white rounded-2xl py-16">
                        <div class="text-5xl mb-3">📭</div>
                        <p class="text-gray-400">${date} 暂无订单</p>
                        <button onclick="openAddModal()" class="mt-4 bg-emerald-500 text-white px-5 py-2 rounded-full text-sm">+ 添加订单</button>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = `
                <div class="mb-3 flex justify-between items-center">
                    <span class="text-sm text-gray-500">📅 ${date}</span>
                    <span class="text-xs text-gray-400">${dayOrders.length}个订单</span>
                </div>
                ${dayOrders.map(order => renderOrderCard(order)).join('')}
            `;
        }
        
        // 渲染单个订单卡片
        function renderOrderCard(order) {
            const timeStr = order.datetime.split('T')[1];
            const isVip = isReturningCustomer(order.phone, order.id);
            const phoneDisplay = order.phone ? order.phone.replace(/(\d{3})\d{4}(\d{4})/, '$1****$2') : '';
            
            return `
                <div class="order-card" onclick="openEditModal('${order.id}')">
                    <div class="flex justify-between items-start mb-3">
                        <div class="flex items-center gap-2 flex-wrap">
                            <span class="time-badge">${timeStr}</span>
                            ${isVip ? '<span class="vip-badge">🌟 老客</span>' : ''}
                        </div>
                        <span class="count-badge">${order.count}部</span>
                    </div>
                    <div class="mb-2">
                        <span class="text-lg font-bold text-gray-800">${escapeHtml(order.name)}</span>
                    </div>
                    <div class="flex items-center gap-3 text-xs text-gray-400">
                        <span>📞 ${phoneDisplay}</span>
                        ${order.note ? `<span class="truncate">📝 ${escapeHtml(order.note)}</span>` : ''}
                    </div>
                </div>
            `;
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m]));
        }
        
        // 保存到 GitHub
        async function saveToGitHub(newOrders, message) {
            const token = getAuthToken();
            const btn = document.getElementById('submitOrderBtn');
            const originalText = btn.innerText;
            btn.innerText = "⏳ 保存中...";
            btn.disabled = true;
            
            const content = btoa(unescape(encodeURIComponent(JSON.stringify(newOrders, null, 2))));
            
            try {
                const res = await fetch(API_URL, {
                    method: "PUT",
                    headers: { "Authorization": `token ${token}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        message: message,
                        content: content,
                        sha: fileSha,
                        branch: GH_BRANCH
                    })
                });
                
                if (res.ok) {
                    const data = await res.json();
                    fileSha = data.content.sha;
                    allOrders = newOrders;
                    closeModal();
                    renderDateSelector();
                    renderOrdersByDate(currentSelectedDate);
                    document.getElementById('syncStatus').innerHTML = `✅ 已同步 · ${allOrders.length}个订单`;
                } else {
                    alert("保存失败，可能有人同时修改，请刷新后重试");
                    await fetchOrders();
                }
            } catch(err) {
                alert("保存失败");
            } finally {
                btn.innerText = originalText;
                btn.disabled = false;
            }
        }
        
        // 打开添加弹窗
        function openAddModal() {
            document.getElementById('modalTitle').innerText = "➕ 添加订单";
            document.getElementById('orderId').value = '';
            document.getElementById('orderName').value = '';
            document.getElementById('orderPhone').value = '';
            document.getElementById('orderDate').value = currentSelectedDate;
            document.getElementById('orderTime').value = '';
            document.getElementById('orderCount').value = '';
            document.getElementById('orderNote').value = '';
            document.getElementById('deleteBtn').classList.add('hidden');
            document.getElementById('vipHint').className = "text-xs mt-2 hidden";
            document.getElementById('orderModal').classList.add('active');
        }
        
        // 打开编辑弹窗
        window.openEditModal = function(orderId) {
            const order = allOrders.find(o => o.id === orderId);
            if (!order) return;
            
            document.getElementById('modalTitle').innerText = "✏️ 编辑订单";
            document.getElementById('orderId').value = order.id;
            document.getElementById('orderName').value = order.name;
            document.getElementById('orderPhone').value = order.phone || '';
            document.getElementById('orderDate').value = order.datetime.split('T')[0];
            document.getElementById('orderTime').value = order.datetime.split('T')[1];
            document.getElementById('orderCount').value = order.count;
            document.getElementById('orderNote').value = order.note || '';
            document.getElementById('deleteBtn').classList.remove('hidden');
            checkVipHint(order.phone, order.id);
            document.getElementById('orderModal').classList.add('active');
        };
        
        function closeModal() {
            document.getElementById('orderModal').classList.remove('active');
        }
        
        // 保存订单
        async function saveOrder() {
            const id = document.getElementById('orderId').value || 'id_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
            const name = document.getElementById('orderName').value.trim();
            const phone = document.getElementById('orderPhone').value.trim();
            const date = document.getElementById('orderDate').value;
            const time = document.getElementById('orderTime').value;
            const count = parseInt(document.getElementById('orderCount').value);
            const note = document.getElementById('orderNote').value.trim();
            const isEdit = document.getElementById('orderId').value !== '';
            
            if (!name || !phone || !date || !time || !count) {
                alert("请填写完整信息");
                return;
            }
            
            const datetime = `${date}T${time}`;
            
            // 检查时间冲突
            const conflict = allOrders.some(o => o.datetime === datetime && o.id !== id);
            if (conflict) {
                alert(`⚠️ ${date} ${time} 已有订单，请换个时间`);
                return;
            }
            
            let newOrders = [...allOrders];
            const orderData = { id, name, phone, datetime, count, note };
            
            if (isEdit) {
                newOrders = newOrders.map(o => o.id === id ? orderData : o);
            } else {
                newOrders.push(orderData);
            }
            
            await saveToGitHub(newOrders, isEdit ? `更新: ${name}` : `新增: ${name}`);
        }
        
        // 删除订单
        async function deleteOrder() {
            const id = document.getElementById('orderId').value;
            const name = document.getElementById('orderName').value;
            if (!confirm(`确定删除「${name}」吗？`)) return;
            
            const newOrders = allOrders.filter(o => o.id !== id);
            await saveToGitHub(newOrders, `删除: ${name}`);
        }
        
        // 事件绑定
        document.getElementById('addBtn').onclick = openAddModal;
        document.getElementById('closeModalBtn').onclick = closeModal;
        document.getElementById('submitOrderBtn').onclick = saveOrder;
        document.getElementById('deleteBtn').onclick = deleteOrder;
        document.getElementById('orderPhone').addEventListener('input', (e) => {
            const orderId = document.getElementById('orderId').value;
            checkVipHint(e.target.value, orderId);
        });
        
        // 点击遮罩关闭
        document.getElementById('orderModal').onclick = (e) => {
            if (e.target === document.getElementById('orderModal')) closeModal();
        };
        
        // 初始化
        fetchOrders();
        
        // 点击刷新时强制重新加载
        window.fetchOrders = fetchOrders;
        window.clearToken = clearToken;
    </script>
</body>
</html>
