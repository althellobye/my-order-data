<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>多人订单管理系统</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
    <style>
        .fc { max-height: 75vh; font-size: 0.85rem; }
        .fc-event { cursor: pointer; padding: 2px 4px; margin: 1px 0; border-radius: 4px; border: none !important; }
        .fc-toolbar { flex-wrap: wrap; gap: 6px; }
        @media (max-width: 640px) {
            .fc-toolbar-title { font-size: 1.1rem !important; }
            .fc-button { padding: 0.35em 0.5em !important; font-size: 0.8rem !important; }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen pb-24">

    <div class="w-full max-w-5xl mx-auto p-2 sm:p-6">
        <div class="bg-white p-4 sm:p-6 rounded-2xl shadow-sm border border-slate-100">
            <div class="flex flex-row justify-between items-center mb-4 gap-2">
                <h1 class="text-xl sm:text-2xl font-bold text-emerald-600 flex items-center gap-1">📅 订单系统</h1>
                <div class="flex gap-2">
                    <button onclick="clearToken()" class="bg-red-50 text-red-600 px-2 py-1.5 rounded-xl text-xs font-medium">重置口令</button>
                    <button onclick="fetchOrders()" class="bg-slate-100 active:bg-slate-200 text-slate-600 px-3 py-1.5 rounded-xl text-xs sm:text-sm font-medium transition">🔄 刷新</button>
                </div>
            </div>
            <div id="calendar"></div>
        </div>
    </div>

    <button id="addBtn" class="fixed bottom-6 right-6 bg-emerald-600 active:bg-emerald-700 text-white w-14 h-14 rounded-full text-3xl shadow-xl flex items-center justify-center z-40">+</button>

    <div id="orderModal" class="fixed inset-0 bg-slate-900/60 hidden items-end sm:items-center justify-center p-0 sm:p-4 z-50">
        <div class="bg-white w-full sm:max-w-md rounded-t-2xl sm:rounded-2xl p-6 shadow-2xl relative max-h-[90vh] overflow-y-auto">
            <div class="w-12 h-1 bg-slate-200 rounded-full mx-auto mb-4 sm:hidden"></div>
            <h3 id="modalTitle" class="text-lg sm:text-xl font-bold mb-4 text-slate-900">添加新订单</h3>
            <form id="orderForm" class="space-y-4" onsubmit="return false;">
                <input type="hidden" id="orderId">
                <div>
                    <label class="block text-xs sm:text-sm font-semibold text-slate-600">订单名称</label>
                    <input type="text" id="orderName" required class="w-full mt-1 px-4 py-3 sm:py-2 bg-slate-50 border border-slate-200 rounded-xl text-base outline-none">
                </div>
                
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="block text-xs sm:text-sm font-semibold text-slate-600">选择日期</label>
                        <input type="date" id="orderOnlyDate" required class="w-full mt-1 px-4 py-3 sm:py-2 bg-slate-50 border border-slate-200 rounded-xl text-base outline-none">
                    </div>
                    <div>
                        <label class="block text-xs sm:text-sm font-semibold text-slate-600">具体时间</label>
                        <input type="time" id="orderOnlyTime" required class="w-full mt-1 px-4 py-3 sm:py-2 bg-slate-50 border border-slate-200 rounded-xl text-base outline-none">
                    </div>
                </div>

                <div>
                    <label class="block text-xs sm:text-sm font-semibold text-slate-600">多少部</label>
                    <input type="number" id="orderCount" required min="1" class="w-full mt-1 px-4 py-3 sm:py-2 bg-slate-50 border border-slate-200 rounded-xl text-base outline-none">
                </div>
                <div>
                    <label class="block text-xs sm:text-sm font-semibold text-slate-600">补充或其他</label>
                    <textarea id="orderNote" rows="2" class="w-full mt-1 px-4 py-3 sm:py-2 bg-slate-50 border border-slate-200 rounded-xl text-base outline-none"></textarea>
                </div>
                <div class="flex flex-col sm:flex-row justify-between items-stretch sm:items-center gap-2 pt-2">
                    <button type="button" id="deleteBtn" class="hidden bg-rose-50 text-rose-600 py-3 sm:py-2 px-4 rounded-xl font-medium text-sm text-center">🗑️ 删除订单</button>
                    <div class="flex flex-row gap-2 sm:ml-auto">
                        <button type="button" id="closeBtn" class="flex-1 sm:flex-none bg-slate-100 text-slate-600 py-3 sm:py-2 px-5 rounded-xl font-medium text-sm">取消</button>
                        <button type="button" id="submitBtn" class="flex-1 sm:flex-none bg-emerald-600 text-white py-3 sm:py-2 px-5 rounded-xl font-medium text-sm shadow-sm">保存</button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <script>
        // ==========================================
        // 1. 固定配置
        // ==========================================
        const GH_USER = "althellobye"; 
        const GH_REPO = "my-order-data"; 
        const GH_BRANCH = "main"; 
        const FILE_PATH = "data.json";

        const API_URL = `https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/${FILE_PATH}`;

        let localOrders = [];
        let calendar;
        let fileSha = ""; 

        function getAuthToken() {
            let token = localStorage.getItem('gh_order_token');
            if (!token || token.trim() === "") {
                token = prompt("🔑 首次使用验证：\n请输入你新生成的 GitHub Token (ghp_开头的口令):");
                if (token) { localStorage.setItem('gh_order_token', token.trim()); }
            }
            return token;
        }

        function clearToken() {
            localStorage.removeItem('gh_order_token');
            alert("同步口令已清除，刷新网页将重新要求输入。");
            location.reload();
        }

        // ==========================================
        // 2. 初始化日历
        // ==========================================
        document.addEventListener('DOMContentLoaded', function() {
            const calendarEl = document.getElementById('calendar');
            const isMobile = window.innerWidth < 640;

            calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: isMobile ? 'listMonth' : 'dayGridMonth',
                locale: 'zh-cn',
                timeZone: 'local',
                displayEventTime: true,
                eventTimeFormat: { hour: '2-digit', minute: '2-digit', hour12: false },
                
                // 🛠️ 核心汉化：把自带的英文按钮和文本全部翻译成中文
                buttonText: {
                    today: '今天',
                    month: '月历',
                    week: '周历',
                    day: '日历',
                    list: '订单列表'
                },
                headerToolbar: { 
                    left: 'prev,next today', // 加上今天按钮
                    center: 'title', 
                    right: isMobile ? 'listMonth,dayGridMonth' : 'dayGridMonth,timeGridWeek' 
                },
                eventClick: function(info) { openModal(info.event.extendedProps); }
            });
            calendar.render();
            fetchOrders(); 
            setInterval(fetchOrders, 20000); 
        });

        // ==========================================
        // 3. 数据请求
        // ==========================================
        async function fetchOrders() {
            const token = getAuthToken();
            if (!token) return;

            try {
                const response = await fetch(`${API_URL}?ts=${new Date().getTime()}`, {
                    headers: { "Authorization": `token ${token}` }
                });
                if (response.status === 401 || response.status === 403) {
                    alert("❌ 口令无效或已被注销，请点击‘重置口令’重新输入！");
                    clearToken();
                    return;
                }
                const data = await response.json();
                fileSha = data.sha; 
                const content = decodeURIComponent(atob(data.content).split('').map(function(c) {
                    return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                }).join(''));
                
                localOrders = JSON.parse(content || "[]");
                renderCalendar();
            } catch (err) {
                console.error("加载数据失败");
            }
        }

        function renderCalendar() {
            const events = localOrders.map(item => ({
                id: item.id,
                title: `[${item.datetime.split('T')[1]}] ${item.name} (${item.count}部)`,
                start: item.datetime,
                backgroundColor: '#10b981',
                extendedProps: item
            }));
            calendar.removeAllEvents();
            calendar.addEventSource(events);
        }

        async function uploadToGitHub(newData, commitMessage) {
            const token = getAuthToken();
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.innerText = "同步中...";
            submitBtn.disabled = true;

            const base64Content = btoa(unescape(encodeURIComponent(JSON.stringify(newData, null, 2))));

            try {
                const response = await fetch(API_URL, {
                    method: "PUT",
                    headers: { "Authorization": `token ${token}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        message: commitMessage,
                        content: base64Content,
                        sha: fileSha,
                        branch: GH_BRANCH
                    })
                });

                if (response.ok) {
                    const resData = await response.json();
                    fileSha = resData.content.sha;
                    localOrders = newData;
                    renderCalendar();
                    closeModal();
                } else {
                    alert("⚠️ 提示：检测到多人在同时修改。系统已自动合并最新状态，请再次点击保存！");
                    fetchOrders();
                }
            } catch (err) {
                alert("保存失败，请检查网络。");
            } finally {
                submitBtn.innerText = "保存";
                submitBtn.disabled = false;
            }
        }

        // ==========================================
        // 4. 弹窗与防重业务逻辑
        // ==========================================
        const modal = document.getElementById('orderModal');
        const deleteBtn = document.getElementById('deleteBtn');

        function openModal(orderData = null) {
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            if (orderData && orderData.id) {
                document.getElementById('modalTitle').innerText = "查看/修改订单";
                document.getElementById('orderId').value = orderData.id;
                document.getElementById('orderName').value = orderData.name;
                
                const parts = orderData.datetime.split('T');
                document.getElementById('orderOnlyDate').value = parts[0];
                document.getElementById('orderOnlyTime').value = parts[1];
                
                document.getElementById('orderCount').value = orderData.count;
                document.getElementById('orderNote').value = orderData.note || '';
                deleteBtn.classList.remove('hidden');
            } else {
                document.getElementById('modalTitle').innerText = "添加新订单";
                document.getElementById('orderId').value = '';
                document.getElementById('orderName').value = '';
                document.getElementById('orderOnlyDate').value = '';
                document.getElementById('orderOnlyTime').value = '';
                document.getElementById('orderCount').value = '';
                document.getElementById('orderNote').value = '';
                deleteBtn.classList.add('hidden');
            }
        }

        function closeModal() { modal.classList.add('hidden'); modal.classList.remove('flex'); }
        document.getElementById('addBtn').addEventListener('click', () => openModal());
        document.getElementById('closeBtn').addEventListener('click', closeModal);

        document.getElementById('submitBtn').addEventListener('click', async () => {
            const id = document.getElementById('orderId').value || '_' + Math.random().toString(36).substr(2, 9);
            const name = document.getElementById('orderName').value.trim();
            const oDate = document.getElementById('orderOnlyDate').value;
            const oTime = document.getElementById('orderOnlyTime').value;
            const count = parseInt(document.getElementById('orderCount').value);
            const note = document.getElementById('orderNote').value.trim();
            const isEdit = document.getElementById('orderId').value !== '';

            if (!name || !oDate || !oTime || !count) {
                alert("请完整填写 名称、日期、时间 和 部数！");
                return;
            }

            const datetime = `${oDate}T${oTime}`;

            document.getElementById('submitBtn').innerText = "正在核对云端...";
            await fetchOrders(); 

            const isTimeOccupied = localOrders.some(item => item.datetime === datetime && item.id !== document.getElementById('orderId').value);
            
            if (isTimeOccupied) {
                const existingOrder = localOrders.find(item => item.datetime === datetime && item.id !== document.getElementById('orderId').value);
                alert(`🚨 撞单拦截！\n\n【${oDate} ${oTime}】这个时间已经被订单【${existingOrder.name}】占用了！\n请更换其他时间。`);
                document.getElementById('submitBtn').innerText = "保存";
                return;
            }

            let updatedOrders = [...localOrders];
            const orderPayload = { id, name, datetime, count, note };

            if (isEdit) { updatedOrders = updatedOrders.map(item => item.id === id ? orderPayload : item); } 
            else { updatedOrders.push(orderPayload); }

            uploadToGitHub(updatedOrders, `${isEdit ? '修改' : '新增'}订单: ${name}`);
        });

        deleteBtn.addEventListener('click', async () => {
            const id = document.getElementById('orderId').value;
            const name = document.getElementById('orderName').value;
            if (confirm(`🚨 再次确认：\n\n你确定要永久删除订单【${name}】吗？`)) {
                const updatedOrders = localOrders.filter(item => item.id !== id);
                await fetchOrders(); 
                uploadToGitHub(updatedOrders, `删除订单: ${name}`);
            }
        });
    </script>
</body>
</html>
