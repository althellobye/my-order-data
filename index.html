<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>正邦家政 · 洗冷氣訂單</title>
    <link rel="manifest" href="data:application/json,{
      \"name\":\"正邦家政\",
      \"short_name\":\"訂單系統\",
      \"start_url\":\"\/\",
      \"display\":\"standalone\",
      \"background_color\":\"#f0f4f8\",
      \"theme_color\":\"#1e3a5f\",
      \"icons\":[
        {\"src\":\"data:image\/svg+xml,%3Csvg xmlns='http:\/\/www.w3.org\/2000\/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%9D%84%EF%B8%8F%3C\/text%3E%3C\/svg%3E\",\"sizes\":\"192x192\",\"type\":\"image\/svg+xml\"},
        {\"src\":\"data:image\/svg+xml,%3Csvg xmlns='http:\/\/www.w3.org\/2000\/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%9D%84%EF%B8%8F%3C\/text%3E%3C\/svg%3E\",\"sizes\":\"512x512\",\"type\":\"image\/svg+xml\"}
      ]
    }">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="正邦家政">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        body{
            background:#f0f4f8;
            font-family:-apple-system,BlinkMacSystemFont,"PingFang HK","Helvetica Neue",system-ui,sans-serif;
            padding:16px 12px 90px 12px;
            color:#1e293b;
        }
        .card{
            background:#ffffff;
            border-radius:28px;
            padding:20px 16px;
            margin-bottom:16px;
            box-shadow:0 2px 12px rgba(0,0,0,0.05);
            border:1px solid rgba(0,0,0,0.03);
        }
        .card h1{
            font-size:22px;
            font-weight:700;
            color:#1e3a5f;
            letter-spacing:-0.3px;
        }
        .subtitle{
            font-size:13px;
            color:#5b7a9a;
            margin-top:2px;
        }
        .btn{
            background:#e8edf4;
            border:none;
            padding:10px 18px;
            border-radius:40px;
            font-size:14px;
            font-weight:600;
            cursor:pointer;
            transition:all 0.15s;
            color:#1e293b;
        }
        .btn:active{transform:scale(0.96);opacity:0.8}
        .btn-primary{background:#1e3a5f;color:#fff}
        .stats-grid{
            display:grid;
            grid-template-columns:repeat(3,1fr);
            gap:12px;
            margin-bottom:16px;
        }
        .stat-card{
            background:linear-gradient(145deg,#1e3a5f,#2a5298);
            border-radius:24px;
            padding:16px 8px;
            text-align:center;
            color:#fff;
            box-shadow:0 4px 12px rgba(30,58,95,0.3);
        }
        .stat-number{font-size:22px;font-weight:800;letter-spacing:-0.5px}
        .stat-label{font-size:11px;opacity:0.8;margin-top:2px}
        .year-selector{
            display:flex;
            justify-content:center;
            align-items:center;
            gap:16px;
            margin-bottom:16px;
        }
        .year-selector button{
            background:#e8edf4;
            border:none;
            width:44px;height:44px;
            border-radius:30px;
            font-size:18px;
            cursor:pointer;
            transition:all 0.15s;
            color:#1e3a5f;
        }
        .year-selector button:active{transform:scale(0.92)}
        .year-selector span{
            font-size:18px;
            font-weight:700;
            min-width:100px;
            text-align:center;
            background:#f8fafc;
            padding:8px 16px;
            border-radius:40px;
            color:#1e3a5f;
        }
        .month-selector{
            display:flex;
            justify-content:center;
            align-items:center;
            gap:16px;
            margin-bottom:12px;
        }
        .month-selector button{
            background:#e8edf4;
            border:none;
            width:36px;height:36px;
            border-radius:30px;
            font-size:16px;
            cursor:pointer;
            color:#1e3a5f;
        }
        .month-selector span{
            font-size:15px;
            font-weight:600;
            min-width:120px;
            text-align:center;
            color:#1e3a5f;
        }
        .report-tabs{
            display:flex;
            gap:10px;
            margin-bottom:12px;
        }
        .tab-btn{
            flex:1;
            background:#e8edf4;
            border:none;
            padding:12px 8px;
            border-radius:40px;
            font-weight:700;
            font-size:14px;
            cursor:pointer;
            transition:all 0.15s;
            color:#5b7a9a;
        }
        .tab-btn.active{
            background:#1e3a5f;
            color:#fff;
            box-shadow:0 2px 8px rgba(30,58,95,0.25);
        }
        .report-summary{
            display:flex;
            justify-content:space-around;
            padding:12px 8px;
            background:#e8edf4;
            border-radius:20px;
            margin-bottom:10px;
            font-weight:700;
            font-size:14px;
            color:#1e3a5f;
        }
        .report-list{
            background:#f8fafc;
            border-radius:20px;
            padding:6px;
            max-height:200px;
            overflow-y:auto;
        }
        .report-item{
            display:flex;
            justify-content:space-between;
            padding:10px 12px;
            border-bottom:1px solid #eef2f6;
            font-size:13px;
            align-items:center;
        }
        .report-item:last-child{border-bottom:none}
        .month-nav{
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:16px;
        }
        .month-nav button{
            background:#e8edf4;
            border:none;
            width:44px;height:44px;
            border-radius:30px;
            font-size:20px;
            cursor:pointer;
            transition:all 0.15s;
            color:#1e3a5f;
        }
        .month-nav button:active{transform:scale(0.92)}
        .month-title{
            font-size:18px;
            font-weight:700;
            color:#1e3a5f;
        }
        .weekdays{
            display:grid;
            grid-template-columns:repeat(7,1fr);
            text-align:center;
            margin-bottom:10px;
            font-size:12px;
            font-weight:600;
            color:#5b7a9a;
        }
        .calendar-grid{
            display:grid;
            grid-template-columns:repeat(7,1fr);
            gap:4px;
        }
        .date-cell{
            background:#ffffff;
            border-radius:14px;
            padding:6px 3px;
            min-height:72px;
            border:1px solid #e8edf4;
            cursor:pointer;
            transition:all 0.1s;
        }
        .date-cell:active{transform:scale(0.97);background:#eef2f6}
        .date-cell.today{
            background:#dbe4f0;
            border:2px solid #1e3a5f;
        }
        .date-cell.has-orders{
            background:#f0f5ff;
        }
        .day-number{
            font-size:14px;
            font-weight:700;
            color:#1e3a5f;
            margin-bottom:3px;
            padding-left:3px;
        }
        .date-cell .order-dot{
            display:flex;
            flex-wrap:wrap;
            gap:2px;
            justify-content:center;
            padding:0 2px;
        }
        .date-cell .order-dot .dot{
            display:inline-block;
            width:16px;
            height:16px;
            border-radius:4px;
            font-size:8px;
            font-weight:700;
            text-align:center;
            line-height:16px;
            color:#fff;
        }
        .dot.pending{background:#60a5fa}
        .dot.progress{background:#fbbf24}
        .dot.completed{background:#94a3b8}
        .fab-group{
            position:fixed;
            bottom:28px;
            right:20px;
            display:flex;
            flex-direction:column;
            gap:12px;
            z-index:100;
        }
        .fab{
            width:60px;height:60px;
            border-radius:30px;
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:28px;
            cursor:pointer;
            box-shadow:0 4px 16px rgba(0,0,0,0.15);
            border:none;
            transition:all 0.15s;
        }
        .fab:active{transform:scale(0.90)}
        .fab-add{background:#1e3a5f;color:#fff}
        .fab-paste{background:#3b82f6;color:#fff;font-size:22px}
        .modal{
            position:fixed;
            bottom:0;left:0;right:0;
            background:#fff;
            border-radius:32px 32px 0 0;
            max-height:88vh;
            overflow-y:auto;
            z-index:200;
            transform:translateY(100%);
            transition:transform .35s cubic-bezier(0.32,0.72,0,1);
            box-shadow:0 -8px 30px rgba(0,0,0,0.12);
        }
        .modal.open{transform:translateY(0)}
        .modal-header{
            padding:20px 20px 14px;
            display:flex;
            justify-content:space-between;
            align-items:center;
            border-bottom:1px solid #e8edf4;
            position:sticky;
            top:0;
            background:#fff;
            border-radius:32px 32px 0 0;
        }
        .modal-header h3{font-size:19px;font-weight:700;color:#1e3a5f}
        .close-btn{
            background:#e8edf4;
            border:none;
            width:40px;height:40px;
            border-radius:30px;
            font-size:22px;
            cursor:pointer;
            transition:all 0.15s;
            color:#1e3a5f;
        }
        .close-btn:active{transform:scale(0.90)}
        .modal-body{padding:20px}
        .form-group{margin-bottom:16px}
        .form-group label{
            font-size:13px;
            font-weight:600;
            display:block;
            margin-bottom:6px;
            color:#1e3a5f;
        }
        .form-group input,
        .form-group textarea{
            width:100%;
            padding:12px 14px;
            border:1.5px solid #dce4ec;
            border-radius:20px;
            font-size:15px;
            background:#fafcff;
            transition:all 0.15s;
            font-family:inherit;
        }
        .form-group input:focus,
        .form-group textarea:focus{
            outline:none;
            border-color:#1e3a5f;
            box-shadow:0 0 0 3px rgba(30,58,95,0.12);
        }
        .form-row{display:flex;gap:12px}
        .form-buttons{
            display:flex;
            gap:12px;
            margin-top:20px;
        }
        .form-buttons button{
            flex:1;
            padding:14px;
            border-radius:40px;
            font-weight:700;
            font-size:15px;
            border:none;
            cursor:pointer;
            transition:all 0.15s;
        }
        .form-buttons button:active{transform:scale(0.97)}
        .order-card{
            background:#f8fafc;
            border-radius:20px;
            padding:14px;
            margin-bottom:12px;
            border-left:5px solid #1e3a5f;
            transition:all 0.15s;
        }
        .order-card.pending{border-left-color:#3b82f6}
        .order-card.progress{border-left-color:#fbbf24;background:#fffbeb}
        .order-card.completed{border-left-color:#94a3b8;background:#f1f5f9}
        .order-card .time{font-weight:700;font-size:14px;color:#1e3a5f}
        .order-card .name{font-size:17px;font-weight:700;margin:6px 0 4px}
        .order-card .detail{font-size:13px;color:#475569;display:flex;gap:12px;flex-wrap:wrap}
        .order-card .status-text{font-size:12px;font-weight:600;margin-top:6px}
        .order-card .actions{margin-top:10px;display:flex;gap:8px}
        .order-card .actions button{
            padding:8px 16px;
            border-radius:30px;
            border:none;
            font-size:13px;
            font-weight:600;
            cursor:pointer;
            transition:all 0.15s;
        }
        .order-card .actions button:active{transform:scale(0.95)}
        .order-card .actions .edit-btn{background:#dbe4f0;color:#1e3a5f}
        .order-card .actions .del-btn{background:#fecaca;color:#dc2626}
        .token-bar{
            background:#e8edf4;
            border-radius:20px;
            padding:14px;
            margin-top:14px;
        }
        .token-input{
            width:100%;
            padding:10px 14px;
            border:1px solid #c7d2fe;
            border-radius:40px;
            margin-top:8px;
            font-size:14px;
            background:#fff;
        }
        .sync-status{
            font-size:12px;
            margin-top:8px;
            text-align:center;
            font-weight:500;
        }
        select{
            width:100%;
            padding:12px 14px;
            border-radius:20px;
            border:1.5px solid #dce4ec;
            background:#fafcff;
            font-size:15px;
            font-family:inherit;
        }
        .empty-state{
            text-align:center;
            padding:40px 20px;
            color:#94a3b8;
            font-size:15px;
        }
        @media(max-width:480px){
            .date-cell{min-height:60px;padding:4px 2px}
            .day-number{font-size:12px}
            .stat-number{font-size:18px}
            .fab{width:56px;height:56px;font-size:24px}
            .date-cell .order-dot .dot{width:14px;height:14px;font-size:7px;line-height:14px}
        }
    </style>
</head>
<body>

<!-- 頂部 -->
<div class="card">
    <h1>❄️ 正邦家政</h1>
    <div class="subtitle">洗冷氣訂單管理</div>
    <div class="token-bar">
        <div id="tokenStatus" style="font-size:13px;font-weight:600;color:#1e3a5f;">⚪ 未連接雲端</div>
        <input type="password" id="tokenInput" class="token-input" placeholder="輸入 GitHub Token (ghp_開頭)">
        <button class="btn btn-primary" id="saveTokenBtn" style="width:100%;margin-top:8px;">🔗 連接雲端</button>
        <div id="syncStatus" class="sync-status"></div>
    </div>
</div>

<!-- 年度選擇器 + 統計 -->
<div class="year-selector">
    <button id="prevYearBtn">‹</button>
    <span id="selectedYear">2026年</span>
    <button id="nextYearBtn">›</button>
</div>

<div class="stats-grid">
    <div class="stat-card"><div class="stat-number" id="totalIncome">$0</div><div class="stat-label">💰 年度收入</div></div>
    <div class="stat-card"><div class="stat-number" id="totalOrders">0</div><div class="stat-label">📋 總訂單</div></div>
    <div class="stat-card"><div class="stat-number" id="totalUnits">0</div><div class="stat-label">❄️ 總洗機</div></div>
</div>

<!-- 本週 / 本月 收入 -->
<div class="card">
    <div class="report-tabs">
        <button class="tab-btn active" id="weekTab">📅 本週</button>
        <button class="tab-btn" id="monthTab">📆 本月</button>
    </div>
    <div class="month-selector" id="monthSelector" style="display:none;">
        <button id="prevMonthStatBtn">‹</button>
        <span id="statMonthDisplay">2026年 6月</span>
        <button id="nextMonthStatBtn">›</button>
    </div>
    <div id="reportSummary" class="report-summary">💰 收入: $0 &nbsp;│&nbsp; ❄️ 洗機: 0部</div>
    <div id="reportList" class="report-list"><div class="empty-state">暫無訂單</div></div>
</div>

<!-- 日曆 -->
<div class="card">
    <div class="month-nav">
        <button id="prevMonth">‹</button>
        <span class="month-title" id="monthTitle"></span>
        <button id="nextMonth">›</button>
    </div>
    <div class="weekdays"><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span><span>日</span></div>
    <div id="calendarGrid" class="calendar-grid"></div>
</div>

<!-- 懸浮按鈕 -->
<div class="fab-group">
    <button class="fab fab-paste" id="pasteBtn">🤖</button>
    <button class="fab fab-add" id="addBtn">+</button>
</div>

<!-- 訂單彈窗 -->
<div id="orderModal" class="modal">
    <div class="modal-header"><h3 id="modalTitle">➕ 新增訂單</h3><button class="close-btn" id="closeOrderModal">✕</button></div>
    <div class="modal-body">
        <input type="hidden" id="editId">
        <div class="form-group"><label>客戶稱呼</label><input type="text" id="name" placeholder="例: 陳先生"></div>
        <div class="form-group"><label>聯絡電話</label><input type="tel" id="phone" placeholder="66668888"></div>
        <div class="form-row"><div class="form-group"><label>日期</label><input type="date" id="date"></div><div class="form-group"><label>時間</label><input type="time" id="time"></div></div>
        <div class="form-group"><label>數量</label><input type="number" id="count" min="1" value="1"></div>
        <div class="form-group"><label>地址 / 備註</label><textarea id="note" rows="2" placeholder="例如: 澳門台山XX大廈10樓B"></textarea></div>
        <div class="form-group"><label>單價 (每部)</label><input type="number" id="price" step="10" value="228"></div>
        <div class="form-group"><label>訂單狀態</label>
            <select id="status">
                <option value="pending">🟦 未開始</option>
                <option value="progress">🟨 進行中</option>
                <option value="completed">⬜ 已完成</option>
            </select>
        </div>
        <div class="form-buttons"><button id="deleteBtn" style="display:none;background:#fecaca;color:#dc2626;">🗑️ 刪除</button><button id="saveBtn" style="background:#1e3a5f;color:#fff;">💾 保存</button></div>
    </div>
</div>

<!-- 智能粘貼彈窗 -->
<div id="pasteModal" class="modal">
    <div class="modal-header"><h3>🤖 智能粘貼</h3><button class="close-btn" id="closePasteModal">✕</button></div>
    <div class="modal-body">
        <textarea id="pasteText" rows="6" style="width:100%;padding:12px;border-radius:20px;border:1.5px solid #dce4ec;font-family:monospace;font-size:14px;background:#fafcff;" placeholder="貼上聊天記錄，例如：
陳生話：聽日下午3點，洗3部冷氣，地址台山XX大廈，電話+853 66668888"></textarea>
        <button id="recognizeBtn" style="margin-top:12px;width:100%;background:#3b82f6;color:#fff;border:none;padding:14px;border-radius:40px;font-weight:700;font-size:16px;cursor:pointer;">🔍 自動識別</button>
        <div id="preview" style="margin-top:16px;display:none;"></div>
    </div>
</div>

<!-- 訂單詳情彈窗 -->
<div id="detailModal" class="modal">
    <div class="modal-header"><h3 id="detailTitle"></h3><button class="close-btn" id="closeDetailModal">✕</button></div>
    <div class="modal-body" id="detailList"></div>
</div>

<script>
var GH_USER="althellobye",GH_REPO="my-order-data",API_URL="https://api.github.com/repos/"+GH_USER+"/"+GH_REPO+"/contents/data.json";
var allOrders=[],fileSha="",currentYear=new Date().getFullYear(),currentMonth=new Date().getMonth(),selectedYear=new Date().getFullYear(),currentReport="week",githubToken=localStorage.getItem('github_token')||"",DEFAULT_PRICE=228,statMonth=new Date().getMonth(),statYear=new Date().getFullYear();

function checkDateChange(){var n=new Date(),s=localStorage.getItem('last_date_check'),t=n.toDateString();if(s!==t){localStorage.setItem('last_date_check',t);refreshAll();var st=document.getElementById('syncStatus');st.innerHTML='🔄 日期已更新';st.style.color='#1e3a5f';setTimeout(function(){if(st.innerHTML==='🔄 日期已更新')st.innerHTML='';},3000);}}
setInterval(checkDateChange,30000);checkDateChange();

function showStatus(m,e){var d=document.getElementById('syncStatus');d.innerHTML=m;d.style.color=e?'#dc2626':'#1e3a5f';setTimeout(function(){if(d.innerHTML===m)d.innerHTML='';},3000);}
function b64e(s){return btoa(unescape(encodeURIComponent(s)));}
function b64d(s){return decodeURIComponent(escape(atob(s)));}

async function loadFromGit(){if(!githubToken){loadLocal();return;}try{var r=await fetch(API_URL+'?t='+Date.now(),{headers:{"Authorization":"token "+githubToken}});if(r.status===401){showStatus("Token無效",true);return;}if(r.status===404){await createFile();return;}var d=await r.json();fileSha=d.sha;var c=b64d(d.content);allOrders=JSON.parse(c||"[]");localStorage.setItem('ac_backup',JSON.stringify(allOrders));refreshAll();showStatus("✅ 已同步",false);document.getElementById('tokenStatus').innerHTML='🟢 已連接雲端';}catch(e){showStatus("⚠️ 雲端失敗",true);loadLocal();}}
async function createFile(){var c=b64e(JSON.stringify([],null,2));var r=await fetch(API_URL,{method:"PUT",headers:{"Authorization":"token "+githubToken,"Content-Type":"application/json"},body:JSON.stringify({message:"init",content:c,branch:"main"})});if(r.ok){var d=await r.json();fileSha=d.content.sha;allOrders=[];refreshAll();showStatus("✅ 已創建",false);}else{showStatus("❌ 創建失敗",true);loadLocal();}}
async function saveToGit(){if(!githubToken||!fileSha){saveLocal();return;}var c=b64e(JSON.stringify(allOrders,null,2));try{var r=await fetch(API_URL,{method:"PUT",headers:{"Authorization":"token "+githubToken,"Content-Type":"application/json"},body:JSON.stringify({message:"update",content:c,sha:fileSha,branch:"main"})});if(r.ok){var d=await r.json();fileSha=d.content.sha;localStorage.setItem('ac_backup',JSON.stringify(allOrders));showStatus("✅ 已保存",false);}else{saveLocal();}}catch(e){saveLocal();}}
function loadLocal(){var s=localStorage.getItem('ac_backup');allOrders=s?JSON.parse(s):[];refreshAll();}
function saveLocal(){localStorage.setItem('ac_backup',JSON.stringify(allOrders));refreshAll();}
function saveData(){if(githubToken&&fileSha)saveToGit();else saveLocal();}
function refreshAll(){renderCalendar();updateYearStats();if(currentReport==='week')renderReport('week');else renderMonthStatReport(statYear,statMonth);}
function getOrderStatus(o){if(o.status)return o.status;var n=new Date(),ot=new Date(o.datetime);if(ot<n)return'completed';else if(ot.toDateString()===n.toDateString())return'progress';else return'pending';}
function getStatusText(s){if(s==='pending')return'🟦 未開始';if(s==='progress')return'🟨 進行中';return'⬜ 已完成';}
function updateYearStats(){document.getElementById('selectedYear').innerHTML=selectedYear+'年';var inc=0,ord=0,unt=0;for(var i=0;i<allOrders.length;i++){var o=allOrders[i];var y=new Date(o.datetime).getFullYear();if(y===selectedYear){var p=o.price||DEFAULT_PRICE;inc+=(o.count||1)*p;ord++;unt+=(o.count||1);}}document.getElementById('totalIncome').innerHTML='$'+inc.toLocaleString();document.getElementById('totalOrders').innerText=ord;document.getElementById('totalUnits').innerText=unt;}
function getWeekRange(){var n=new Date(),d=n.getDay();var m=new Date(n);m.setDate(n.getDate()-(d===0?6:d-1));var s=new Date(m);s.setDate(m.getDate()+6);function f(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}return{start:f(m),end:f(s)};}
function getMonthRange(y,m){var s=y+'-'+String(m+1).padStart(2,'0')+'-01';var l=new Date(y,m+1,0).getDate();return{start:s,end:y+'-'+String(m+1).padStart(2,'0')+'-'+String(l).padStart(2,'0')};}
function renderReport(p){var r=p==='week'?getWeekRange():getMonthRange(new Date().getFullYear(),new Date().getMonth());if(p==='week'){document.getElementById('monthSelector').style.display='none';}else{document.getElementById('monthSelector').style.display='flex';document.getElementById('statMonthDisplay').innerHTML=statYear+'年 '+(statMonth+1)+'月';}var d=[],tI=0,tU=0;for(var i=0;i<allOrders.length;i++){var o=allOrders[i];var dt=o.datetime.split('T')[0];if(dt>=r.start&&dt<=r.end){var inc=(o.price||DEFAULT_PRICE)*(o.count||1);d.push({date:dt,name:o.name,count:o.count,income:inc});tI+=inc;tU+=(o.count||1);}}d.sort(function(a,b){return a.date.localeCompare(b.date);});var c=document.getElementById('reportList');var sm=document.getElementById('reportSummary');sm.innerHTML='💰 收入: $'+tI.toLocaleString()+' &nbsp;│&nbsp; ❄️ 洗機: '+tU+'部';if(d.length===0){c.innerHTML='<div class="empty-state">暫無訂單</div>';}else{var html='';for(var i=0;i<d.length;i++){html+='<div class="report-item"><span>'+d[i].date+'</span><span>'+d[i].name+'('+d[i].count+'部)</span><span style="font-weight:700;color:#1e3a5f;">$'+d[i].income+'</span></div>';}c.innerHTML=html;}}
function renderMonthStatReport(y,m){document.getElementById('monthSelector').style.display='flex';document.getElementById('statMonthDisplay').innerHTML=y+'年 '+(m+1)+'月';var r=getMonthRange(y,m);var d=[],tI=0,tU=0;for(var i=0;i<allOrders.length;i++){var o=allOrders[i];var dt=o.datetime.split('T')[0];if(dt>=r.start&&dt<=r.end){var inc=(o.price||DEFAULT_PRICE)*(o.count||1);d.push({date:dt,name:o.name,count:o.count,income:inc});tI+=inc;tU+=(o.count||1);}}d.sort(function(a,b){return a.date.localeCompare(b.date);});var c=document.getElementById('reportList');var sm=document.getElementById('reportSummary');sm.innerHTML='💰 收入: $'+tI.toLocaleString()+' &nbsp;│&nbsp; ❄️ 洗機: '+tU+'部';if(d.length===0){c.innerHTML='<div class="empty-state">暫無訂單</div>';}else{var html='';for(var i=0;i<d.length;i++){html+='<div class="report-item"><span>'+d[i].date+'</span><span>'+d[i].name+'('+d[i].count+'部)</span><span style="font-weight:700;color:#1e3a5f;">$'+d[i].income+'</span></div>';}c.innerHTML=html;}}
function renderCalendar(){var f=new Date(currentYear,currentMonth,1);var off=(f.getDay()===0?6:f.getDay()-1);var days=new Date(currentYear,currentMonth+1,0).getDate();var g=document.getElementById('calendarGrid');g.innerHTML="";document.getElementById('monthTitle').innerHTML=currentYear+'年'+String(currentMonth+1).padStart(2,'0')+'月';var today=new Date().toISOString().slice(0,10);for(var i=0;i<off;i++){var e=document.createElement('div');e.className='date-cell';e.style.background='#f1f5f9';e.style.opacity='0.4';g.appendChild(e);}for(var d=1;d<=days;d++){var ds=currentYear+'-'+String(currentMonth+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');var dayOrders=allOrders.filter(function(o){return o.datetime&&o.datetime.startsWith(ds);});var cell=document.createElement('div');cell.className='date-cell';if(dayOrders.length>0)cell.classList.add('has-orders');if(ds===today)cell.classList.add('today');var num=document.createElement('div');num.className='day-number';num.innerText=d;cell.appendChild(num);if(dayOrders.length>0){var dotContainer=document.createElement('div');dotContainer.className='order-dot';for(var j=0;j<dayOrders.length;j++){var o=dayOrders[j];var st=getOrderStatus(o);var dot=document.createElement('span');dot.className='dot '+st;var timeStr=o.datetime.split('T')[1].slice(0,5);dot.innerText=timeStr.replace(':','');dotContainer.appendChild(dot);}cell.appendChild(dotContainer);}cell.onclick=(function(ds,dayOrders){return function(){showDetail(ds,dayOrders);};})(ds,dayOrders);g.appendChild(cell);}}
function showDetail(ds,orders){document.getElementById('detailTitle').innerHTML='📅 '+ds;var c=document.getElementById('detailList');if(orders.length===0){c.innerHTML='<div class="empty-state">暫無訂單</div>';}else{var html='';for(var i=0;i<orders.length;i++){var o=orders[i];var p=o.price||DEFAULT_PRICE;var st=getOrderStatus(o);var stText=getStatusText(st);html+='<div class="order-card '+st+'">';html+='<div class="time">⏰ '+o.datetime.split('T')[1]+'</div>';html+='<div class="name">❄️ '+escapeHtml(o.name)+'</div>';html+='<div class="detail"><span>📞 '+(o.phone||'')+'</span><span>🔢 '+o.count+'部 × $'+p+' = $'+((o.count||1)*p)+'</span></div>';html+='<div class="status-text">'+stText+'</div>';if(o.note){html+='<div style="font-size:13px;color:#64748b;margin-top:4px;">📍 '+escapeHtml(o.note)+'</div>';}html+='<div class="actions"><button class="edit-btn" data-id="'+o.id+'">✏️ 編輯</button><button class="del-btn" data-id="'+o.id+'">🗑️ 刪除</button></div>';html+='</div>';}c.innerHTML=html;var editBtns=document.querySelectorAll('.edit-btn');for(var i=0;i<editBtns.length;i++){editBtns[i].onclick=function(){editOrder(this.getAttribute('data-id'));};}var delBtns=document.querySelectorAll('.del-btn');for(var i=0;i<delBtns.length;i++){delBtns[i].onclick=function(){var that=this;if(confirm('確認刪除？')){allOrders=allOrders.filter(function(o){return o.id!==that.getAttribute('data-id');});saveData();closeDetailModal();}};}}document.getElementById('detailModal').classList.add('open');}
function editOrder(id){var o=null;for(var i=0;i<allOrders.length;i++){if(allOrders[i].id===id){o=allOrders[i];break;}}if(!o)return;document.getElementById('editId').value=o.id;document.getElementById('name').value=o.name;document.getElementById('phone').value=o.phone||'';document.getElementById('date').value=o.datetime.split('T')[0];document.getElementById('time').value=o.datetime.split('T')[1];document.getElementById('count').value=o.count;document.getElementById('note').value=o.note||'';document.getElementById('price').value=o.price||DEFAULT_PRICE;document.getElementById('status').value=o.status||getOrderStatus(o);document.getElementById('modalTitle').innerText="✏️ 編輯訂單";document.getElementById('deleteBtn').style.display="block";closeDetailModal();openOrderModal();}
async function saveOrder(){var id=document.getElementById('editId').value||('id_'+Date.now()+'_'+Math.random().toString(36).substr(2,6));var name=document.getElementById('name').value.trim();var phone=document.getElementById('phone').value.trim();var date=document.getElementById('date').value;var time=document.getElementById('time').value;var count=parseInt(document.getElementById('count').value);var note=document.getElementById('note').value.trim();var price=parseInt(document.getElementById('price').value);var status=document.getElementById('status').value;var isEdit=document.getElementById('editId').value!=='';if(!name||!phone||!date||!time||!count){alert("請填寫完整");return;}if(isNaN(price)||price<=0)price=DEFAULT_PRICE;var datetime=date+'T'+time;for(var i=0;i<allOrders.length;i++){if(allOrders[i].datetime===datetime&&allOrders[i].id!==id){alert('⚠️ '+date+' '+time+' 已被預約');return;}}var orderData={id:id,name:name,phone:phone,datetime:datetime,count:count,note:note,price:price,status:status};if(isEdit){for(var i=0;i<allOrders.length;i++){if(allOrders[i].id===id){allOrders[i]=orderData;break;}}}else{allOrders.push(orderData);}await saveData();closeOrderModal();}
async function deleteOrder(){var id=document.getElementById('editId').value;var name=document.getElementById('name').value;if(!confirm('刪除「'+name+'」嗎？'))return;allOrders=allOrders.filter(function(o){return o.id!==id;});await saveData();closeOrderModal();}
function escapeHtml(s){if(!s)return'';return s.replace(/[&<>]/g,function(m){if(m==='&')return'&amp;';if(m==='<')return'&lt;';if(m==='>')return'&gt;';return m;});}
function recognizeText(t){var r={name:"",phone:"",date:"",time:"",count:1,note:""};var m=t.match(/\b(\d{8})\b/);if(m)r.phone=m[1];else{m=t.match(/1[3-9]\d{9}/);if(m)r.phone=m[0];}m=t.match(/(\d+)\s*[部台]/);if(m)r.count=parseInt(m[1]);var today=new Date();function fmt(y,m,d){return y+'-'+String(m).padStart(2,'0')+'-'+String(d).padStart(2,'0');}if(t.includes("今日")||t.includes("今天"))r.date=fmt(today.getFullYear(),today.getMonth()+1,today.getDate());else if(t.includes("聽日")||t.includes("明天")){var d=new Date(today);d.setDate(today.getDate()+1);r.date=fmt(d.getFullYear(),d.getMonth()+1,d.getDate());}else if(t.includes("後日")||t.includes("后天")){var d=new Date(today);d.setDate(today.getDate()+2);r.date=fmt(d.getFullYear(),d.getMonth()+1,d.getDate());}else{var dm=t.match(/(\d{1,2})月(\d{1,2})[日號]/);if(dm){var mo=parseInt(dm[1]);var da=parseInt(dm[2]);var yr=today.getFullYear();if(mo<today.getMonth()+1)yr++;r.date=fmt(yr,mo,da);}}var tm=t.match(/(\d{1,2})[:：](\d{2})/);if(tm)r.time=String(tm[1]).padStart(2,'0')+':'+tm[2];else{tm=t.match(/(\d{1,2})\s*[點点]/);if(tm){var h=parseInt(tm[1]);if((t.includes("下午")||t.includes("下晝"))&&h<12)h+=12;r.time=String(h).padStart(2,'0')+':00';}}var nm=t.match(/([陳張李黃何鄭梁謝吳劉][生太小姐女士先生]?)/);r.name=nm?nm[0]+" 洗冷氣":"洗冷氣訂單";var ad=t.match(/(?:地址|响|喺)[：:]*\s*([^，,。\n]{5,30})/);if(ad)r.note=ad[1];return r;}
function doRecognize(){var raw=document.getElementById('pasteText').value;if(!raw.trim()){alert("請貼上聊天記錄");return;}var rec=recognizeText(raw);var div=document.getElementById('preview');div.style.display='block';div.innerHTML='<div style="background:#e8edf4;padding:16px;border-radius:20px;"><strong style="font-size:15px;color:#1e3a5f;">✅ 識別結果</strong><div style="margin-top:8px;line-height:1.8;color:#1e293b;">📛 客戶：'+rec.name+'<br>📞 電話：'+(rec.phone||'未識別')+'<br>📅 日期：'+(rec.date||'未識別')+'<br>⏰ 時間：'+(rec.time||'未識別')+'<br>🔢 數量：'+rec.count+'部<br>📍 地址：'+(rec.note||'無')+'</div><button id="applyBtn" style="margin-top:12px;width:100%;background:#1e3a5f;color:#fff;border:none;padding:12px;border-radius:40px;font-weight:700;">📝 填寫</button></div>';document.getElementById('applyBtn').onclick=function(){document.getElementById('name').value=rec.name;document.getElementById('phone').value=rec.phone||'';if(rec.date)document.getElementById('date').value=rec.date;if(rec.time)document.getElementById('time').value=rec.time;document.getElementById('count').value=rec.count;document.getElementById('note').value=rec.note||'';document.getElementById('price').value=DEFAULT_PRICE;document.getElementById('status').value='pending';document.getElementById('editId').value='';document.getElementById('deleteBtn').style.display='none';document.getElementById('modalTitle').innerText="➕ 新增訂單";closePasteModal();openOrderModal();};}
function openOrderModal(){document.getElementById('orderModal').classList.add('open');}
function closeOrderModal(){document.getElementById('orderModal').classList.remove('open');}
function openPasteModal(){document.getElementById('pasteModal').classList.add('open');document.getElementById('preview').style.display='none';document.getElementById('pasteText').value='';}
function closePasteModal(){document.getElementById('pasteModal').classList.remove('open');}
function closeDetailModal(){document.getElementById('detailModal').classList.remove('open');}

document.getElementById('prevMonth').onclick=function(){currentMonth--;if(currentMonth<0){currentMonth=11;currentYear--;}renderCalendar();};
document.getElementById('nextMonth').onclick=function(){currentMonth++;if(currentMonth>11){currentMonth=0;currentYear++;}renderCalendar();};
document.getElementById('prevYearBtn').onclick=function(){selectedYear--;updateYearStats();};
document.getElementById('nextYearBtn').onclick=function(){selectedYear++;updateYearStats();};
document.getElementById('addBtn').onclick=function(){document.getElementById('editId').value='';document.getElementById('name').value='';document.getElementById('phone').value='';document.getElementById('date').value=new Date().toISOString().slice(0,10);document.getElementById('time').value='';document.getElementById('count').value='1';document.getElementById('note').value='';document.getElementById('price').value=DEFAULT_PRICE;document.getElementById('status').value='pending';document.getElementById('deleteBtn').style.display='none';document.getElementById('modalTitle').innerText="➕ 新增訂單";openOrderModal();};
document.getElementById('pasteBtn').onclick=openPasteModal;
document.getElementById('closeOrderModal').onclick=closeOrderModal;
document.getElementById('closePasteModal').onclick=closePasteModal;
document.getElementById('closeDetailModal').onclick=closeDetailModal;
document.getElementById('saveBtn').onclick=saveOrder;
document.getElementById('deleteBtn').onclick=deleteOrder;
document.getElementById('recognizeBtn').onclick=doRecognize;
document.getElementById('weekTab').onclick=function(){currentReport='week';var btns=document.querySelectorAll('.tab-btn');for(var i=0;i<btns.length;i++)btns[i].classList.remove('active');document.getElementById('weekTab').classList.add('active');renderReport('week');};
document.getElementById('monthTab').onclick=function(){currentReport='month';var btns=document.querySelectorAll('.tab-btn');for(var i=0;i<btns.length;i++)btns[i].classList.remove('active');document.getElementById('monthTab').classList.add('active');statMonth=new Date().getMonth();statYear=new Date().getFullYear();renderMonthStatReport(statYear,statMonth);};
document.getElementById('prevMonthStatBtn').onclick=function(){statMonth--;if(statMonth<0){statMonth=11;statYear--;}renderMonthStatReport(statYear,statMonth);};
document.getElementById('nextMonthStatBtn').onclick=function(){statMonth++;if(statMonth>11){statMonth=0;statYear++;}renderMonthStatReport(statYear,statMonth);};
document.getElementById('saveTokenBtn').onclick=function(){var t=document.getElementById('tokenInput').value.trim();if(t){localStorage.setItem('github_token',t);githubToken=t;document.getElementById('tokenStatus').innerHTML='🟢 已連接雲端';loadFromGit();}};
loadLocal();if(githubToken){document.getElementById('tokenStatus').innerHTML='🟢 已連接雲端';loadFromGit();}
</script>
